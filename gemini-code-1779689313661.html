    const shuffleArray = (array) => {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];

        utterance.rate = 0.9;
        
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = voices.find(voice => 
          voice.lang.includes('en-US') && (voice.name.includes('Google') || voice.name.includes('Samantha') || voice.name.includes('Siri'))

        setGameWords(words);
        setCurrentIndex(0);
        setScore(0);
        setLives(3);
        setCombo(0);
        setFeedback(null);
        setShotAnswer(null);
        setWrongWords([]); 
        setAiTip(null); 
        setAiError(null);
        setIsPaused(false);
        setupQuestion(words[0], mode, words);
        setScreen('game');
      };

      const setupQuestion = (word, mode, allWords) => {
        setFeedback(null);
        setShotAnswer(null);
        setTimeLeft(100); 
        
        if (mode === 'recognition') {
          const wrongOptions = allWords
            .filter(w => w.en !== word.en)
            .sort(() => 0.5 - Math.random())
            .slice(0, 3);
          setOptions(shuffleArray([word, ...wrongOptions]));
        } else if (mode === 'scramble') {
          const chars = word.en.split('');
          let shuffledChars = shuffleArray(chars);
          while(shuffledChars.join('') === word.en && word.en.length > 1) {
            shuffledChars = shuffleArray(chars);
          }
          setScrambleTiles(shuffledChars.map((char, index) => ({ id: index, char, selectedIndex: null })));
          setSpellingInput('');
        } else if (mode === 'spelling') {
          setSpellingInput('');
          setTimeout(() => inputRef.current?.focus(), 100);
          speakWord(word.en);
        }
      };

      const handleAnswer = (answer, isTimeout = false) => {
        if (feedback !== null) return; 
        
        const currentWord = gameWords[currentIndex];
        let isCorrect = false;

        if (!isTimeout) {
          if (selectedMode === 'recognition') {
            setShotAnswer(answer); 
            isCorrect = answer === currentWord.en;
          } else {
            isCorrect = answer.trim().toLowerCase() === currentWord.en.toLowerCase();
          }
        }

        if (isCorrect) {
          const timeBonus = Math.floor(timeLeft / 10); 
          const comboBonus = combo * 5; 
          setScore(s => s + 10 + timeBonus + comboBonus);
          setCombo(c => c + 1);
          setFeedback('correct');
          speakWord(currentWord.en);
        } else {
          setLives(l => l - 1);
          setCombo(0);
          setFeedback(isTimeout ? 'timeout' : 'wrong');
          setWrongWords(prev => {
            if (!prev.includes(currentWord)) {
              return [...prev, currentWord];
            }
            return prev;
          });
        }

        setTimeout(() => {
          setLives((currentLives) => {
            if (currentLives <= 0) {
              handleGameOver();
              return 0;
            } else {
              if (currentIndex + 1 < gameWords.length) {
                setCurrentIndex(i => i + 1);
                setupQuestion(gameWords[currentIndex + 1], selectedMode, gameWords);
              } else {
                handleGameOver();
              }
              return currentLives;
            }
          });
        }, 1500);
      };

      // 遊戲結算與進度儲存
      const handleGameOver = () => {
         // 計算獲得星數: 3血=3星, 2血=2星, 1血=1星, 0血=0星
         const earnedStars = lives > 0 ? lives : 0;
         
         const newProgress = {...progress};
         newProgress.totalScore += score;
         
         // 紀錄各課星數 (只保留最高星數)
         const lessonKey = `L${selectedLesson}_${selectedMode}`;
         const previousStars = newProgress.lessonStars[lessonKey] || 0;
         
         if (earnedStars > previousStars) {
            newProgress.lessonStars[lessonKey] = earnedStars;
            // 增加總星數差額
            newProgress.totalStars += (earnedStars - previousStars);
         }
         
         setProgress(newProgress);
         saveProgress(newProgress);
         setScreen('result');
      };

      const toggleScrambleTile = (id) => {
        if (feedback !== null || isPaused) return;
        
        setScrambleTiles(tiles => {
          const clickedTile = tiles.find(t => t.id === id);
          let newTiles;

          if (clickedTile.selectedIndex !== null) {
            newTiles = tiles.map(t => t.id === id ? { ...t, selectedIndex: null } : t);
          } else {
            const maxIndex = Math.max(-1, ...tiles.map(t => t.selectedIndex !== null ? t.selectedIndex : -1));
            newTiles = tiles.map(t => t.id === id ? { ...t, selectedIndex: maxIndex + 1 } : t);
          }

          const selectedOrdered = newTiles
            .filter(t => t.selectedIndex !== null)
            .sort((a, b) => a.selectedIndex - b.selectedIndex);

          const currentSelected = selectedOrdered.map(t => t.char).join('');
          setSpellingInput(currentSelected);
          
          if (currentSelected.length === gameWords[currentIndex].en.length) {
            handleAnswer(currentSelected);
          }
          return newTiles;
        });
      };

      const fetchAiTip = async () => {
        if (isAiLoading) return;
        setIsAiLoading(true);
        setAiTip(null);
        setAiError(null);

        const apiKey = ""; 

        const wordsToLearn = wrongWords.length > 0
          ? wrongWords.slice(0, 3).map(w => `${w.en}(${w.zh})`).join('、')
          : gameWords.slice(0, 2).map(w => `${w.en}(${w.zh})`).join('、');

        const promptText = `玩家剛剛完成單字遊戲。請用極具創意、熱血且幽默的方式（例如：好笑的諧音記憶法、超短的搞笑聯想情境），教國中生記住這幾個英文單字：${wordsToLearn}。請用繁體中文回答，語氣要像一個熱血的電競教練，鼓勵玩家！(限制在150字以內)`;

        const payload = {
          contents: [{ parts: [{ text: promptText }] }],
          systemInstruction: { parts: [{ text: "你是一位充滿熱血與幽默感的國中英文教練，擅長用好笑的諧音或聯想幫助學生背單字。" }] }
        };

        let retries = 5;
        let delay = 1000;
        let resultText = null;

        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error('API Request Failed');
            const data = await response.json();
            resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (resultText) break;
          } catch (error) {
            if (i === retries - 1) {
              setAiError('AI 教練連線超時，請稍後再試。');
              setIsAiLoading(false);
              return;
            }
            await new Promise(r => setTimeout(r, delay));
            delay *= 2; 
          }
        }

        if (resultText) {
          setAiTip(resultText);
        }
        setIsAiLoading(false);
      };

      // 計算特定課程獲得的總星數 (最高 9 星: 3模式 x 3星)
      const getLessonStars = (lesson) => {
         const s1 = progress.lessonStars[`L${lesson}_recognition`] || 0;
         const s2 = progress.lessonStars[`L${lesson}_scramble`] || 0;
         const s3 = progress.lessonStars[`L${lesson}_spelling`] || 0;
         return s1 + s2 + s3;
      };

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 font-sans selection:bg-blue-500 relative">
          
          {/* --- 主畫面 --- */}
          {screen === 'home' && (
            <div className="flex flex-col items-center justify-center min-h-screen p-6 animate-in fade-in duration-500">
              <div className="bg-slate-800 p-8 md:p-12 rounded-3xl shadow-2xl max-w-lg w-full text-center border-t-8 border-blue-500 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-full bg-blue-500/10 blur-3xl pointer-events-none"></div>
                <BookOpen className="w-20 h-20 mx-auto text-blue-400 mb-6 relative z-10" />
                <h1 className="text-4xl font-extrabold mb-4 text-white relative z-10">博幼 800 單</h1>
                <h2 className="text-2xl font-bold mb-8 text-blue-400 relative z-10">單字爭霸戰</h2>
                
                <div className="flex justify-center gap-4 mb-8 relative z-10">
                   <div className="bg-slate-900 px-4 py-2 rounded-xl border border-slate-700 flex items-center gap-2">
                     <Star className="w-5 h-5 text-amber-400 fill-current" />
                     <span className="font-bold">{progress.totalStars} 星</span>
                   </div>
                   <div className="bg-slate-900 px-4 py-2 rounded-xl border border-slate-700 flex items-center gap-2">

                     <span className="font-bold">{progress.totalScore} 分</span>
                   </div>
                </div>

                <div className="flex flex-col gap-4 relative z-10">
                  <button 
                    onClick={() => setScreen('lesson')}
                    className="w-full bg-blue-600 hover:bg-blue-500 text-white text-xl font-bold py-4 px-8 rounded-2xl transition-all transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(37,99,235,0.4)]"
                  >
                    <Play className="fill-current" /> 開始挑戰
                  </button>
                  <button 
                    onClick={() => setScreen('profile')}
                    className="w-full bg-slate-700 hover:bg-slate-600 text-white text-lg font-bold py-4 px-8 rounded-2xl transition-all flex items-center justify-center gap-2"
                  >
                    <User className="w-5 h-5" /> 玩家紀錄
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- 玩家紀錄 (Profile) --- */}
          {screen === 'profile' && (
            <div className="max-w-4xl mx-auto p-6 pt-12 animate-in slide-in-from-bottom-8 duration-500">
               <button onClick={() => setScreen('home')} className="mb-6 text-slate-400 hover:text-white flex items-center gap-2 font-semibold bg-slate-800 px-4 py-2 rounded-lg transition-colors">
                 <ArrowLeft className="w-5 h-5" /> 返回首頁
               </button>
               
               <div className="bg-slate-800 rounded-3xl p-8 border border-slate-700 shadow-2xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
                  
                  <div className="flex items-center gap-4 mb-8">
                     <div className="bg-blue-600 p-4 rounded-2xl shadow-lg shadow-blue-500/30">
                        <Medal className="w-10 h-10 text-white" />
                     </div>
                     <div>
                        <h2 className="text-3xl font-extrabold text-white">生涯成就</h2>
                        <p className="text-slate-400">努力背單字的證明都在這裡</p>
                     </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                     <div className="bg-slate-900 p-6 rounded-2xl border border-slate-700 flex items-center justify-between">
                        <div>
                           <p className="text-slate-400 font-bold mb-1">累積總分</p>
                           <p className="text-4xl font-black text-white">{progress.totalScore}</p>
                        </div>
                        <Trophy className="w-12 h-12 text-emerald-400 opacity-80" />
                     </div>
                     <div className="bg-slate-900 p-6 rounded-2xl border border-slate-700 flex items-center justify-between">
                        <div>
                           <p className="text-slate-400 font-bold mb-1">獲得星星</p>
                           <p className="text-4xl font-black text-amber-400">{progress.totalStars} <span className="text-lg text-slate-500">/ 360</span></p>
                        </div>
                        <Star className="w-12 h-12 text-amber-400 fill-current opacity-80" />
                     </div>
                  </div>

                  <h3 className="text-xl font-bold text-white mb-4 border-b border-slate-700 pb-2">各課星級進度</h3>
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 max-h-64 overflow-y-auto custom-scrollbar pr-2">
                     {Object.keys(vocabularyData).map(lesson => {
                        const stars = getLessonStars(lesson);
                        return (
                           <div key={lesson} className="bg-slate-900 p-3 rounded-xl border border-slate-700 flex flex-col items-center">
                              <span className="text-slate-400 font-bold text-sm mb-1">Lesson {lesson}</span>
                              <div className="flex gap-1">
                                 {stars > 0 
                                    ? <span className="text-amber-400 font-bold">{stars} ⭐</span> 
                                    : <span className="text-slate-600">-</span>}
                              </div>
                           </div>
                        )
                     })}
                  </div>
               </div>
            </div>
          )}

          {/* --- 選擇課程 (完整 40 課滾動式版面) --- */}
          {screen === 'lesson' && (
            <div className="max-w-5xl mx-auto p-4 pt-10 h-screen flex flex-col animate-in slide-in-from-bottom-8 duration-500">
              <div className="flex-shrink-0">
                <button onClick={() => setScreen('home')} className="mb-4 text-slate-400 hover:text-white flex items-center gap-2 font-semibold bg-slate-800 px-4 py-2 rounded-lg transition-colors w-fit">
                  <ArrowLeft className="w-5 h-5" /> 返回首頁
                </button>
                <div className="flex justify-between items-end mb-6">
                  <h2 className="text-3xl font-extrabold text-white flex items-center gap-3">
                    <BookOpen className="text-blue-500"/> 選擇課程 
                  </h2>
                  <div className="text-amber-400 font-bold bg-slate-800 px-3 py-1 rounded-lg border border-slate-700 flex items-center gap-1">
                     <Star className="w-4 h-4 fill-current"/> {progress.totalStars}
                  </div>
                </div>
              </div>
              
              {/* 滾動區域 */}
              <div className="flex-1 overflow-y-auto pr-2 pb-10 custom-scrollbar">
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
                  {Object.keys(vocabularyData).map(lesson => {
                     const stars = getLessonStars(lesson);
                     return (
                        <button
                          key={lesson}
                          onClick={() => {
                            setSelectedLesson(lesson);
                            setScreen('mode');
                          }}
                          className="bg-slate-800 hover:bg-slate-700 border-2 border-slate-700 hover:border-blue-500 text-slate-200 py-5 px-3 rounded-2xl font-bold text-lg transition-all shadow-sm hover:shadow-blue-500/20 flex flex-col items-center gap-2 transform hover:-translate-y-1 relative"
                        >
                          <div className="bg-blue-900/50 text-blue-400 w-10 h-10 rounded-full flex items-center justify-center text-xl shadow-inner mb-1">
                            {lesson}
                          </div>
                          Lesson {lesson}
                          {/* 顯示該課獲得的星數 */}
                          {stars > 0 && (
                             <div className="absolute top-2 right-2 flex text-amber-400 text-xs gap-0.5">
                               {stars} ⭐
                             </div>
                          )}
                        </button>
                     )
                  })}
                </div>
              </div>
            </div>
          )}

          {/* --- 選擇模式 --- */}
          {screen === 'mode' && (
            <div className="max-w-4xl mx-auto p-6 pt-12 animate-in slide-in-from-right-8 duration-300">
              <button onClick={() => setScreen('lesson')} className="mb-6 text-slate-400 hover:text-white flex items-center gap-2 font-semibold bg-slate-800 px-4 py-2 rounded-lg transition-colors">
                <ArrowLeft className="w-5 h-5"/> 重新選擇課程
              </button>
              <div className="mb-8">
                <h2 className="text-3xl font-extrabold text-white mb-2 flex items-center gap-3">
                  <Zap className="text-amber-400" /> Lesson {selectedLesson} 挑戰模式
                </h2>
                <p className="text-slate-400 text-lg">系統將隨機抽出 20 題，小心別把愛心扣光了！</p>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {[
                  { id: 'recognition', icon: MousePointerClick, title: '認讀挑戰', desc: '看到中文，擊毀入侵的英文幽浮。', color: 'emerald', stars: progress.lessonStars[`L${selectedLesson}_recognition`] || 0 },
                  { id: 'scramble', icon: Shuffle, title: '字母重組', desc: '將打散的字母重新排列成正確的單字。', color: 'amber', stars: progress.lessonStars[`L${selectedLesson}_scramble`] || 0 },
                  { id: 'spelling', icon: Keyboard, title: '拼字測驗', desc: '看到中文並聽發音，完整拼出英文字。', color: 'indigo', stars: progress.lessonStars[`L${selectedLesson}_spelling`] || 0 }
                ].map(m => (
                   <button key={m.id} onClick={() => startGame(m.id)} className={`bg-slate-800 border-2 border-slate-700 hover:border-${m.color}-500 group p-8 rounded-3xl text-left transition-all shadow-lg hover:shadow-${m.color}-500/20 hover:-translate-y-2 relative overflow-hidden`}>
                     <div className="absolute top-4 right-6 flex gap-1">
                        {Array.from({length: 3}).map((_, i) => (
                           <Star key={i} className={`w-5 h-5 ${i < m.stars ? 'text-amber-400 fill-current drop-shadow-[0_0_5px_rgba(251,191,36,0.8)]' : 'text-slate-600'}`} />
                        ))}
                     </div>
                     <div className={`bg-${m.color}-500/20 p-4 rounded-2xl w-fit mb-6 text-${m.color}-400 group-hover:bg-${m.color}-500 group-hover:text-white transition-colors`}>
                       <m.icon className="w-8 h-8" />
                     </div>
                     <h3 className="text-2xl font-bold mb-2 text-white">{m.title}</h3>
                     <p className="text-slate-400">{m.desc}</p>
                   </button>
                ))}
              </div>
            </div>
          )}

          {/* --- 遊戲進行中 --- */}
          {screen === 'game' && (
            <div className="max-w-4xl mx-auto p-4 md:p-6 min-h-screen flex flex-col">
              
              {/* HUD (遊戲狀態列) */}
              <div className="bg-slate-800 p-4 rounded-2xl shadow-lg border border-slate-700 flex flex-wrap justify-between items-center mb-6 gap-4">
                
                {/* 左側：暫停與返回 */}
                <div className="flex gap-2">
                  <button 
                    onClick={() => setScreen('mode')} 
                    className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-slate-300 hover:text-white transition-colors"
                    title="返回上一頁"
                  >
                    <ArrowLeft className="w-6 h-6" />
                  </button>
                  <button 
                    onClick={() => setIsPaused(true)} 
                    className="p-2 bg-slate-700 hover:bg-blue-600 rounded-lg text-slate-300 hover:text-white transition-colors"
                    title="暫停遊戲"
                  >
                    <Pause className="w-6 h-6" />
                  </button>
                </div>

                {/* 中間：分數與連擊 */}
                <div className="flex items-center gap-6 font-mono">
                  <div className="flex flex-col items-center">
                    <span className="text-slate-400 text-xs uppercase font-bold">Score</span>
                    <span className="text-2xl font-black text-blue-400">{score}</span>
                  </div>
                  <div className="flex flex-col items-center">
                    <span className="text-slate-400 text-xs uppercase font-bold">Combo</span>
                    <span className={`text-2xl font-black flex items-center ${combo > 0 ? 'text-amber-400' : 'text-slate-600'}`}>
                      <Zap className={`w-5 h-5 mr-1 ${combo > 0 ? 'fill-current' : ''}`} /> {combo}
                    </span>
                  </div>
                </div>

                {/* 右側：生命值 HP */}
                <div className="flex gap-1 bg-slate-900 p-2 rounded-xl border border-slate-700">
                  {Array.from({ length: 3 }).map((_, i) => (
                    <Heart 
                      key={i} 
                      className={`w-8 h-8 transition-all duration-300 ${
                        i < lives 
                          ? 'text-rose-500 fill-current drop-shadow-[0_0_8px_rgba(244,63,94,0.6)]' 
                          : 'text-slate-700'
                      }`} 
                    />
                  ))}
                </div>
              </div>

              {/* 計時條 */}
              <div className="w-full bg-slate-800 rounded-full h-4 mb-8 overflow-hidden border border-slate-700 relative">
                <div 
                  className={`h-full rounded-full transition-all duration-100 ease-linear ${
                    timeLeft > 50 ? 'bg-emerald-500' : timeLeft > 25 ? 'bg-amber-500' : 'bg-rose-500'
                  }`} 
                  style={{ width: `${(timeLeft / 100) * 100}%` }}
                ></div>
                <Clock className="w-4 h-4 absolute top-0 left-1/2 -translate-x-1/2 text-white/50" />
              </div>

              {/* 題目區 */}
              <div className="flex-1 flex flex-col items-center justify-center bg-slate-800/50 rounded-3xl p-6 md:p-10 border border-slate-700/50 relative overflow-hidden">
                
                <div className="absolute top-4 right-6 text-slate-500 font-bold tracking-widest text-sm z-20">
                  {currentIndex + 1} / {gameWords.length}
                </div>
                
                {/* 戰爭模式下隱藏原本的標題，改由防禦塔顯示 */}
                {selectedMode !== 'recognition' && (
                  <>
                    <h2 className={`text-5xl md:text-7xl font-black text-white mb-8 text-center break-words transition-transform ${
                      feedback === 'wrong' || feedback === 'timeout' ? 'animate-shake text-rose-400' : ''
                    }`}>
                      {gameWords[currentIndex]?.zh}
                    </h2>

                    {/* 提示發音按鈕 */}
                    <button 
                      onClick={() => speakWord(gameWords[currentIndex].en)}
                      className="mb-10 flex items-center gap-2 text-blue-400 hover:text-blue-300 bg-blue-900/30 border border-blue-800/50 px-6 py-2 rounded-full font-semibold transition-colors"
                    >
                      <Volume2 className="w-5 h-5" /> 聆聽發音
                    </button>
                  </>
                )}

                {/* 互動介面 */}
                <div className="w-full max-w-2xl">
                  
                  {/* 模式 1：認讀 (戰爭防禦遊戲) */}
                  {selectedMode === 'recognition' && (
                    <div className="relative w-full h-[400px] md:h-[450px] bg-slate-900 overflow-hidden border-2 border-slate-700 rounded-3xl shadow-inner mt-2">
                      {/* 星空背景 */}
                      <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black opacity-80"></div>
                      
                      {/* 敵人 (選項 UFO) */}
                      {options.map((opt, i) => {
                        const dropPercentage = Math.max(0, Math.min(85, ((100 - timeLeft) / 100) * 85));
                        const isShot = shotAnswer === opt.en;
                        const isCorrect = opt.en === gameWords[currentIndex].en;
                        
                        let enemyState = "alive";
                        if (feedback) {
                          if (isCorrect && (feedback === 'correct' || feedback === 'timeout')) enemyState = "destroyed";
                          else if (isShot && feedback === 'wrong') enemyState = "shielded"; 
                        }

                        return (
                          <button
                            key={i}
                            onClick={() => handleAnswer(opt.en)}
                            disabled={feedback !== null || isPaused}
                            className={`absolute transform -translate-x-1/2 flex flex-col items-center transition-all duration-200 z-10 ${
                              enemyState === 'destroyed' ? 'scale-150 opacity-0 duration-500' :
                              enemyState === 'shielded' ? 'animate-shake' : 'hover:scale-110 hover:-translate-y-2'
                            }`}
                            style={{
                              left: `${12.5 + i * 25}%`,
                              top: `${dropPercentage}%`,
                            }}
                          >
                            {enemyState === 'destroyed' ? (
                              <div className="w-20 h-20 bg-orange-500 rounded-full blur-xl animate-pulse"></div> 
                            ) : (
                              <>
                                <div className={`w-14 h-14 mb-2 rounded-full flex items-center justify-center border-2 transition-colors ${
                                  enemyState === 'shielded' ? 'bg-rose-900 border-rose-500 shadow-[0_0_15px_rgba(244,63,94,0.6)]' : 'bg-slate-800 border-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.5)]'
                                }`}>
                                  {enemyState === 'shielded' ? <Shield className="w-8 h-8 text-rose-500" /> : <Rocket className="w-8 h-8 text-amber-400 transform rotate-180" />}
                                </div>
                                <span className={`bg-slate-900 text-white font-bold px-3 py-1 rounded-lg border shadow-md text-sm md:text-lg transition-colors ${
                                  enemyState === 'shielded' ? 'border-rose-500 text-rose-300' : 'border-slate-600'
                                }`}>
                                  {opt.en}
                                </span>
                              </>
                            )}
                            
                            {/* 雷射光束特效 */}
                            {isShot && enemyState !== 'destroyed' && (
                              <div className="absolute top-16 w-2 h-[500px] bg-rose-500 shadow-[0_0_15px_#f43f5e] origin-top animate-pulse -z-10"></div>
                            )}
                            {isShot && enemyState === 'destroyed' && (
                              <div className="absolute top-16 w-3 h-[500px] bg-blue-400 shadow-[0_0_20px_#60a5fa] origin-top animate-pulse -z-10"></div>
                            )}
                          </button>
                        )
                      })}

                      {/* 玩家基地 (防禦塔) */}
                      <div className="absolute bottom-0 left-0 w-full flex flex-col items-center z-20 pointer-events-none">
                        <div className={`w-full h-1 blur-sm mb-1 ${feedback === 'wrong' || feedback === 'timeout' ? 'bg-rose-500/80' : 'bg-blue-500/30'}`}></div>
                        <div className={`w-4/5 md:w-3/5 px-6 py-4 rounded-t-3xl border-t-4 border-l-4 border-r-4 flex flex-col items-center justify-center transition-colors duration-300 ${
                          feedback === 'wrong' || feedback === 'timeout' ? 'bg-rose-950/90 border-rose-600 shadow-[0_-10px_30px_rgba(225,29,72,0.4)]' : 
                          feedback === 'correct' ? 'bg-emerald-950/90 border-emerald-500 shadow-[0_-10px_30px_rgba(16,185,129,0.4)]' : 'bg-blue-950/90 border-blue-600 shadow-[0_-10px_30px_rgba(37,99,235,0.4)]'
                        }`}>
                           <Crosshair className={`w-8 h-8 mb-2 animate-pulse ${
                             feedback === 'wrong' || feedback === 'timeout' ? 'text-rose-500' :
                             feedback === 'correct' ? 'text-emerald-400' : 'text-blue-400'
                           }`} />
                           <span className="text-3xl md:text-5xl font-black text-white tracking-widest drop-shadow-lg">
                             {gameWords[currentIndex]?.zh}
                           </span>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 模式 2：字母重組 */}
                  {selectedMode === 'scramble' && (
                    <div className="flex flex-col items-center w-full">
                      {/* 作答區 */}
                      <div className="flex flex-wrap justify-center gap-2 mb-8 min-h-[72px] p-4 bg-slate-900 rounded-2xl shadow-inner w-full border-2 border-slate-700">
                        {scrambleTiles.filter(t => t.selectedIndex !== null).sort((a, b) => a.selectedIndex - b.selectedIndex).map((t) => (
                          <button
                            key={t.id}
                            onClick={() => toggleScrambleTile(t.id)}
                            disabled={feedback !== null || isPaused}
                            className="w-12 h-12 md:w-14 md:h-14 bg-blue-600 text-white rounded-xl text-2xl font-bold flex items-center justify-center transform transition-transform hover:scale-105 shadow-[0_4px_0_rgb(37,99,235)]"
                          >
                            {t.char}
                          </button>
                        ))}
                        {scrambleTiles.filter(t => t.selectedIndex !== null).length === 0 && (
                          <span className="text-slate-500 font-medium my-auto text-lg">點擊下方字母來拼字</span>
                        )}
                      </div>
                      
                      {/* 字母池 */}
                      <div className="flex flex-wrap justify-center gap-3">
                        {scrambleTiles.map((t) => (
                          <button
                            key={t.id}
                            onClick={() => toggleScrambleTile(t.id)}
                            disabled={t.selectedIndex !== null || feedback !== null || isPaused}
                            className={`w-12 h-12 md:w-14 md:h-14 rounded-xl text-2xl font-bold flex items-center justify-center transition-all ${
                              t.selectedIndex !== null 
                                ? 'bg-slate-800 text-slate-700 shadow-none border-2 border-slate-700 border-dashed' 
                                : 'bg-slate-700 text-white border-2 border-slate-600 hover:border-amber-400 hover:text-amber-400 shadow-[0_4px_0_rgb(71,85,105)] hover:-translate-y-1'
                            }`}
                          >
                            {t.selectedIndex !== null ? '' : t.char}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* 模式 3：拼字 */}
                  {selectedMode === 'spelling' && (
                    <div className="w-full flex flex-col gap-4">
                      <form 
                        onSubmit={(e) => { e.preventDefault(); handleAnswer(spellingInput); }}
                        className="w-full relative"
                      >
                        <input
                          ref={inputRef}
                          type="text"
                          value={spellingInput}
                          onChange={(e) => setSpellingInput(e.target.value)}
                          disabled={feedback !== null || isPaused}
                          placeholder={`請拼出英文 (${gameWords[currentIndex]?.en.length} 個字母)`}
                          className="w-full text-center text-3xl font-bold p-6 rounded-2xl bg-slate-900 border-4 border-slate-700 text-white focus:border-indigo-500 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 transition-all shadow-inner"
                          autoComplete="off"
                          spellCheck="false"
                        />
                        <button 
                          type="submit"
                          disabled={!spellingInput || feedback !== null || isPaused}
                          className="absolute right-4 top-1/2 -translate-y-1/2 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 text-white p-3 rounded-xl transition-colors shadow-md"
                        >
                          <ArrowRight className="w-6 h-6" />
                        </button>
                      </form>
                      <p className="text-center text-slate-500 font-medium">輸入完畢請按 Enter 鍵送出</p>
                    </div>
                  )}
                  
                </div>
                
                {/* 答題回饋 (O/X) */}
                <div className={`mt-8 min-h-[64px] flex items-center justify-center w-full max-w-lg rounded-2xl ${
                    feedback === 'correct' ? 'bg-emerald-900/50 text-emerald-400 border border-emerald-500/50' :
                    feedback === 'wrong' || feedback === 'timeout' ? 'bg-rose-900/50 text-rose-400 border border-rose-500/50' : 'opacity-0'
                  } transition-opacity duration-300 p-4`}
                >
                  {feedback === 'correct' && (
                    <div className="flex items-center gap-2 text-xl font-bold">
                      <Check className="w-8 h-8" /> 答對了！太厲害了！
                    </div>
                  )}
                  {feedback === 'timeout' && (
                    <div className="flex items-center gap-2 text-xl font-bold">
                      <Clock className="w-8 h-8" /> 時間到！正確答案是：<span className="text-2xl underline ml-1 text-white">{gameWords[currentIndex].en}</span>
                    </div>
                  )}
                  {feedback === 'wrong' && (
                    <div className="flex items-center gap-2 text-xl font-bold">
                      <X className="w-8 h-8" /> 哎呀，答錯了。正確答案是：<span className="text-2xl underline ml-1 text-white">{gameWords[currentIndex].en}</span>
                    </div>
                  )}
                </div>

              </div>
            </div>
          )}

          {/* --- 暫停選單 (Overlay) --- */}
          {isPaused && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center animate-in fade-in">
              <div className="bg-slate-800 p-8 rounded-3xl border-2 border-slate-600 shadow-2xl max-w-sm w-full text-center">
                <Pause className="w-16 h-16 text-blue-500 mx-auto mb-4" />
                <h2 className="text-3xl font-extrabold text-white mb-8">遊戲暫停</h2>
                <div className="flex flex-col gap-4">
                  <button 
                    onClick={() => {
                      setIsPaused(false);
                      if(selectedMode === 'spelling') setTimeout(() => inputRef.current?.focus(), 100);
                    }}
                    className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg"
                  >
                    <Play className="w-5 h-5" /> 繼續遊戲
                  </button>
                  <button 
                    onClick={() => setScreen('mode')}
                    className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all"
                  >
                    <ArrowLeft className="w-5 h-5" /> 返回選單
                  </button>
                  <button 
                    onClick={() => setScreen('home')}
                    className="w-full bg-transparent border-2 border-slate-600 hover:border-slate-500 text-slate-300 hover:text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all"
                  >
                    <Home className="w-5 h-5" /> 回到首頁
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- 結果結算畫面 --- */}
          {screen === 'result' && (
            <div className="flex flex-col items-center justify-center min-h-screen p-6 animate-in zoom-in-95 duration-500">
              <div className="bg-slate-800 p-8 md:p-12 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-amber-400 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-full bg-amber-500/10 blur-3xl pointer-events-none"></div>
                
                <h2 className="text-4xl font-extrabold mb-2 text-white relative z-10">
                  {lives > 0 ? '挑戰完成！' : 'Game Over'}
                </h2>
                <p className="text-slate-400 mb-8 font-medium relative z-10">Lesson {selectedLesson} - {
                  selectedMode === 'recognition' ? '認讀挑戰' : 
                  selectedMode === 'scramble' ? '字母重組' : '拼字測驗'
                }</p>
                
                {/* 分數面板 */}
                <div className="bg-slate-900 rounded-3xl w-full py-8 mb-8 border border-slate-700 shadow-inner relative z-10 flex flex-col items-center">
                  <span className="text-slate-400 uppercase font-bold tracking-widest mb-2">本次得分</span>
                  <span className="text-7xl font-black text-amber-400 drop-shadow-[0_0_15px_rgba(251,191,36,0.4)]">{score}</span>
                  
                  <div className="flex justify-center gap-2 mt-6 border-t border-slate-700 pt-4 w-4/5 mx-auto">
                     {/* 獲得星數計算 */}
                     {Array.from({ length: 3 }).map((_, i) => (
                       <Star 
                         key={i} 
                         className={`w-8 h-8 ${i < (lives > 0 ? lives : 0) ? 'text-amber-400 fill-current drop-shadow-[0_0_10px_rgba(251,191,36,0.8)]' : 'text-slate-700'}`} 
                       />
                     ))}
                  </div>
                </div>
                
                <p className="text-xl font-bold text-slate-300 mb-8 relative z-10">
                  {lives === 3 ? '🎉 完美通關！獲得 3 顆星！' :
                   lives > 0 ? `🔥 表現不錯！獲得 ${lives} 顆星！` :
                   '💀 愛心歸零了！繼續練習一定能過關！'}
                </p>

                {/* ✨ AI 記憶教練區塊 */}
                <div className="w-full bg-slate-900 border-2 border-indigo-500/50 rounded-2xl p-6 mb-8 relative z-10 text-left shadow-[0_0_20px_rgba(99,102,241,0.2)]">
                  <div className="flex items-center gap-3 mb-4">
                    <div className="bg-indigo-500 p-2 rounded-xl">
                      <Bot className="w-6 h-6 text-white" />
                    </div>
                    <h3 className="text-xl font-bold text-white flex items-center gap-2">
                      <Sparkles className="w-5 h-5 text-indigo-400" /> AI 專屬記憶教練
                    </h3>
                  </div>
                  
                  {aiTip ? (
                    <div className="bg-slate-800 p-4 rounded-xl border border-indigo-500/30 animate-in fade-in zoom-in-95 duration-500">
                      <p className="text-slate-200 leading-relaxed whitespace-pre-wrap font-medium">{aiTip}</p>
                    </div>
                  ) : aiError ? (
                    <div className="bg-rose-900/50 p-4 rounded-xl border border-rose-500/30">
                      <p className="text-rose-300">{aiError}</p>
                    </div>
                  ) : (
                    <p className="text-slate-400 mb-4">
                      {wrongWords.length > 0 
                        ? `教練發現你在 ${wrongWords.map(w=>w.en).slice(0,3).join(', ')} 等單字遇到了困難。`
                        : '太神啦！全部答對！想聽聽教練分享單字冷知識嗎？'}
                    </p>
                  )}

                  {!aiTip && !isAiLoading && (
                    <button 
                      onClick={fetchAiTip}
                      className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 transform hover:scale-[1.02] active:scale-95"
                    >
                      <Sparkles className="w-5 h-5" /> 呼叫教練傳授秘訣
                    </button>
                  )}
                  
                  {isAiLoading && (
                    <button disabled className="w-full bg-indigo-600/50 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 cursor-not-allowed">
                      <Loader2 className="w-5 h-5 animate-spin" /> 教練正在為你構思專屬記憶法...
                    </button>
                  )}
                </div>

                <div className="flex flex-col gap-3 relative z-10">
                  <button 
                    onClick={() => startGame(selectedMode)}
                    className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-2 shadow-lg"
                  >
                    <RotateCcw className="w-5 h-5" /> 再玩一次
                  </button>
                  <button 
                    onClick={() => setScreen('mode')}
                    className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 px-6 rounded-2xl transition-all"
                  >
                    選擇其他模式
                  </button>
                  <button 
                    onClick={() => setScreen('lesson')}
                    className="w-full text-slate-500 hover:text-white font-semibold py-3 transition-colors"
                  >
                    返回課程列表
                  </button>
                </div>
              </div>
            </div>
          )}
          
          {/* 搖晃與滾動條動畫設定 */}
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              25% { transform: translateX(-10px); }
              50% { transform: translateX(10px); }
              75% { transform: translateX(-10px); }
            }
            .animate-shake {
              animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            }
            .custom-scrollbar::-webkit-scrollbar {
              width: 8px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
              background: #1e293b;
              border-radius: 10px;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
              background: #3b82f6;
              border-radius: 10px;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover {
              background: #60a5fa;
            }
          `}} />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<BoyoGameApp />);
  </script>
</body>
</html>
