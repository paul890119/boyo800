    const shuffleArray = (array) => {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    };

    const speakWord = (word, lang = 'en-US') => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = lang;
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }
    };

    // ========== 應用主體 ==========
    const App = () => {
      const [currentScreen, setCurrentScreen] = useState('login');
      const [students, setStudents] = useState({});
      const [currentStudentId, setCurrentStudentId] = useState(null);
      const [currentStudent, setCurrentStudent] = useState(null);
      
      const [selectedLesson, setSelectedLesson] = useState(null);
      const [selectedMode, setSelectedMode] = useState(null);
      const [selectedDifficulty, setSelectedDifficulty] = useState('normal');
      
      const [gameWords, setGameWords] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [lives, setLives] = useState(3);
      const [combo, setCombo] = useState(0);
      const [timeLeft, setTimeLeft] = useState(100);
      const [isPaused, setIsPaused] = useState(false);
      
      const [feedback, setFeedback] = useState(null);
      const [options, setOptions] = useState([]);
      const [scrambleTiles, setScrambleTiles] = useState([]);
      const [spellingInput, setSpellingInput] = useState('');
      const [shotAnswer, setShotAnswer] = useState(null);
      const [wrongWords, setWrongWords] = useState([]);
      const inputRef = useRef(null);

      useEffect(() => { loadStudents(); }, []);

      const loadStudents = () => {
        setStudents(StorageManager.getAllStudents());
      };

      const handleLogin = (studentId, studentName) => {
        let student = StorageManager.getStudent(studentId);
        if (studentName && (!students[studentId] || students[studentId].name !== studentName)) {
          student.name = studentName;
          StorageManager.saveStudent(studentId, student);
        }
        setCurrentStudent(student);
        setCurrentStudentId(studentId);
        setCurrentScreen('home');
        loadStudents();
      };

      const handleTeacherLogin = () => {
        setCurrentScreen('teacher-dashboard');
      };

      const handleLogout = () => {
        setCurrentStudent(null);
        setCurrentStudentId(null);
        setCurrentScreen('login');
      };

      const updateCurrentStudent = (updater) => {
        const updated = updater({ ...currentStudent });
        setCurrentStudent(updated);
        StorageManager.saveStudent(currentStudentId, updated);
      };

      // 計時器
      useEffect(() => {
        let timer;
        const diffSettings = DIFFICULTY_SETTINGS[selectedDifficulty] || DIFFICULTY_SETTINGS.normal;
        if (currentScreen === 'game' && !isPaused && feedback === null && timeLeft > 0) {
          timer = setInterval(() => {
            setTimeLeft((prev) => {
              if (prev <= 1) {
                clearInterval(timer);
                handleAnswer('', true);
                return 0;
              }
              return prev - 1;
            });
          }, 100);
        }
        return () => clearInterval(timer);
      }, [currentScreen, isPaused, feedback, timeLeft, selectedDifficulty]);

      const startGame = (mode) => {
        setSelectedMode(mode);
        const diffSettings = DIFFICULTY_SETTINGS[selectedDifficulty];
        const words = shuffleArray(vocabularyData[selectedLesson]).slice(0, 20);
        setGameWords(words);
        setCurrentIndex(0);
        setScore(0);
        setLives(3 + diffSettings.healthBonus);
        setCombo(0);
        setFeedback(null);
        setShotAnswer(null);
        setWrongWords([]);
        setIsPaused(false);
        setupQuestion(words[0], mode, words);
        setCurrentScreen('game');
      };

      const setupQuestion = (word, mode, allWords) => {
        setFeedback(null);
        setShotAnswer(null);
        setTimeLeft(DIFFICULTY_SETTINGS[selectedDifficulty].timePerQuestion);
        
        if (mode === 'recognition') {
          const wrongOptions = allWords.filter(w => w.en !== word.en).sort(() => 0.5 - Math.random()).slice(0, 3);
          setOptions(shuffleArray([word, ...wrongOptions]));
        } else if (mode === 'scramble') {
          const chars = word.en.split('');
          let shuffledChars = shuffleArray(chars);
          while(shuffledChars.join('') === word.en && word.en.length > 1) {
            shuffledChars = shuffleArray(chars);
          }
          setScrambleTiles(shuffledChars.map((char, index) => ({ id: index, char, selectedIndex: null })));
          setSpellingInput('');
        } else if (mode === 'spelling') {
          setSpellingInput('');
          setTimeout(() => inputRef.current?.focus(), 100);
          speakWord(word.en);
        }
      };

      const handleAnswer = (answer, isTimeout = false) => {
        if (feedback !== null) return;
        const currentWord = gameWords[currentIndex];
        const diffSettings = DIFFICULTY_SETTINGS[selectedDifficulty];
        let isCorrect = false;

        if (!isTimeout) {
          if (selectedMode === 'recognition') {
            setShotAnswer(answer);
            isCorrect = answer === currentWord.en;
          } else {
            isCorrect = answer.trim().toLowerCase() === currentWord.en.toLowerCase();
          }
        }

        if (isCorrect) {
          const timeBonus = Math.floor(timeLeft / 10);
          const comboBonus = combo * 5;
          const totalScore = Math.floor((10 + timeBonus + comboBonus) * diffSettings.scoreMultiplier);
          setScore(s => s + totalScore);
          setCombo(c => c + 1);
          setFeedback('correct');
          speakWord(currentWord.en);
        } else {
          setLives(l => l - 1);
          setCombo(0);
          setFeedback(isTimeout ? 'timeout' : 'wrong');
          setWrongWords(prev => {
            if (!prev.find(w => w.en === currentWord.en)) return [...prev, currentWord];
            return prev;
          });
        }

        setTimeout(() => {
          setLives((currentLives) => {
            if (currentLives <= 0) {
              handleGameOver(false);
              return 0;
            } else {
              if (currentIndex + 1 < gameWords.length) {
                setCurrentIndex(i => i + 1);
                setupQuestion(gameWords[currentIndex + 1], selectedMode, gameWords);
              } else {
                handleGameOver(true);
              }
              return currentLives;
            }
          });
        }, 1500);
      };

      const handleGameOver = (won) => {
        const earnedStars = lives > 0 ? Math.min(lives, 3) : 0;
        
        updateCurrentStudent(prev => {
          const newStudent = { ...prev };
          newStudent.totalScore += score;
          
          const lessonKey = `L${selectedLesson}_${selectedMode}`;
          const previousStars = newStudent.lessonStars[lessonKey] || 0;
          
          if (earnedStars > previousStars) {
            newStudent.lessonStars[lessonKey] = earnedStars;
            const starDiff = earnedStars - previousStars;
            newStudent.totalStars += starDiff;
            newStudent.starsBalance = (newStudent.starsBalance || 0) + starDiff;
          }

          if (!newStudent.gameHistory) newStudent.gameHistory = [];
          newStudent.gameHistory.push({
            lesson: selectedLesson,
            mode: selectedMode,
            score: score,
            stars: earnedStars,
            won: won,
            date: new Date().toISOString(),
            difficulty: selectedDifficulty
          });

          // 判斷成就
          const totalStars = newStudent.totalStars;
          const totalGames = newStudent.gameHistory.length;
          if (totalGames >= 1 && !newStudent.achievements.includes('first_win')) newStudent.achievements.push('first_win');
          if (totalStars >= 50 && !newStudent.achievements.includes('collector')) newStudent.achievements.push('collector');
          if (totalStars >= 200 && !newStudent.achievements.includes('scholar')) newStudent.achievements.push('scholar');
          if (won && lives >= 3 && !newStudent.achievements.includes('perfect_game')) newStudent.achievements.push('perfect_game');

          return newStudent;
        });
        
        setCurrentScreen('result');
      };

      const buyItem = (itemKey, price) => {
        if (currentStudent.starsBalance >= price && !currentStudent.unlockedItems.includes(itemKey)) {
          updateCurrentStudent(prev => {
            return {
              ...prev,
              starsBalance: prev.starsBalance - price,
              unlockedItems: [...prev.unlockedItems, itemKey]
            };
          });
          alert(`成功購買 ${ITEMS[itemKey].name}！`);
        }
      };

      const equipItem = (itemKey, type) => {
        updateCurrentStudent(prev => {
          const newState = { ...prev };
          if (type === 'theme') newState.equippedTheme = itemKey;
          if (type === 'avatar') newState.equippedAvatar = itemKey;
          return newState;
        });
      };

      const getLessonStars = (lesson) => {
        if (!currentStudent) return 0;
        const s1 = currentStudent.lessonStars[`L${lesson}_recognition`] || 0;
        const s2 = currentStudent.lessonStars[`L${lesson}_scramble`] || 0;
        const s3 = currentStudent.lessonStars[`L${lesson}_spelling`] || 0;
        return s1 + s2 + s3;
      };

      const StudentHeader = () => (
        <div className="bg-slate-900/80 backdrop-blur border-b border-slate-700/50 p-4 sticky top-0 z-40">
          <div className="max-w-7xl mx-auto flex justify-between items-center">
            <div className="flex items-center gap-4">
              <div className="bg-slate-800 p-2 rounded-xl text-cyan-400 text-2xl border border-slate-700">
                {currentStudent.equippedAvatar === 'avatar_bot' ? '🤖' : currentStudent.equippedAvatar === 'avatar_alien' ? '👽' : '👤'}
              </div>
              <div>
                <h2 className="font-bold text-white text-lg">{currentStudent.name}</h2>
                <div className="flex items-center gap-3 text-sm font-mono">
                  <span className="text-slate-400">ID: {currentStudent.id}</span>
                  <span className="flex items-center text-amber-400 font-bold bg-amber-400/10 px-2 py-0.5 rounded-md"><Star size={14} className="mr-1 fill-current"/> {currentStudent.starsBalance || 0} 可用</span>
                </div>
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setCurrentScreen('home')} className="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition" title="首頁"><Home size={20}/></button>
              <button onClick={() => setCurrentScreen('store')} className="p-2 hover:bg-slate-800 rounded-lg text-amber-400 hover:text-amber-300 transition" title="商店"><ShoppingCart size={20}/></button>
              <button onClick={() => setCurrentScreen('stats')} className="p-2 hover:bg-slate-800 rounded-lg text-emerald-400 hover:text-emerald-300 transition" title="統計"><BarChart3 size={20}/></button>
              <button onClick={() => setCurrentScreen('achievements')} className="p-2 hover:bg-slate-800 rounded-lg text-purple-400 hover:text-purple-300 transition" title="成就"><Trophy size={20}/></button>
              <button onClick={handleLogout} className="p-2 hover:bg-rose-500/20 rounded-lg text-rose-400 transition" title="登出"><LogOut size={20}/></button>
            </div>
          </div>
        </div>
      );

      // --- 渲染路由 ---
      if (currentScreen === 'login') return <LoginScreen onLogin={handleLogin} onTeacherLogin={handleTeacherLogin} allStudents={students} />;
      if (currentScreen === 'teacher-dashboard') return <TeacherDashboard onNavigate={setCurrentScreen} />;
      if (!currentStudent) return null;

      return (
        <div className={`w-screen min-h-screen overflow-x-hidden ${
          currentStudent.equippedTheme === 'theme_cyberpunk' ? 'bg-gradient-to-b from-gray-900 via-purple-900 to-black' :
          currentStudent.equippedTheme === 'theme_neon' ? 'bg-gradient-to-br from-indigo-900 via-fuchsia-900 to-slate-900' :
          'bg-gradient-to-b from-slate-900 via-blue-900 to-slate-900'
        }`}>
          <StudentHeader />

          {/* 首頁 (課程選擇) */}
          {currentScreen === 'home' && (
            <div className="max-w-6xl mx-auto p-6 pt-10 animate-in fade-in duration-500">
              <div className="flex justify-between items-end mb-8">
                <div>
                  <h1 className="text-4xl font-black neon-text text-white mb-2">博幼單字爭霸戰</h1>
                  <p className="text-cyan-300">選擇課程開始你的挑戰！</p>
                </div>
                <div className="text-right">
                  <div className="text-slate-400 text-sm">總積分</div>
                  <div className="text-3xl font-black text-purple-400 neon-text">{currentStudent.totalScore}</div>
                </div>
              </div>

              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                {Object.keys(vocabularyData).map(lesson => {
                  const stars = getLessonStars(lesson);
                  return (
                    <button
                      key={lesson}
                      onClick={() => { setSelectedLesson(lesson); setCurrentScreen('difficulty'); }}
                      className="bg-slate-800/60 backdrop-blur border border-slate-700 hover:border-cyan-400 py-6 px-3 rounded-2xl font-bold transition-all hover:-translate-y-1 relative group"
                    >
                      <div className="bg-cyan-500/20 text-cyan-300 w-12 h-12 rounded-full flex items-center justify-center text-xl shadow-inner mx-auto mb-3 group-hover:bg-cyan-500 group-hover:text-white transition-colors">
                        {lesson}
                      </div>
                      <div className="text-white">L{lesson}</div>
                      {stars > 0 && (
                        <div className="absolute top-2 right-2 text-amber-400 text-xs font-bold flex items-center bg-amber-400/10 px-2 py-1 rounded-full border border-amber-400/20">
                          {stars}<Star className="w-3 h-3 fill-current ml-0.5"/>
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* 難度選擇 */}
          {currentScreen === 'difficulty' && (
            <div className="max-w-4xl mx-auto p-6 pt-12 animate-in slide-in-from-right-8">
              <h2 className="text-3xl font-black mb-8 flex items-center gap-3 text-white">
                <Target className="text-cyan-400 w-8 h-8" /> Lesson {selectedLesson} - 選擇難度
              </h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {Object.entries(DIFFICULTY_SETTINGS).map(([key, settings]) => (
                  <button key={key} onClick={() => { setSelectedDifficulty(key); setCurrentScreen('mode'); }}
                    className="bg-slate-800/80 p-8 rounded-3xl border border-slate-600 hover:border-cyan-400 transition-all hover:shadow-[0_0_20px_rgba(34,211,238,0.3)] text-left group"
                  >
                    <h3 className="text-2xl font-bold mb-4 flex items-center gap-2 group-hover:text-cyan-300 text-white transition-colors">
                      {key === 'easy' && '🎯'} {key === 'normal' && '⚡'} {key === 'hard' && '🔥'} {settings.name}
                    </h3>
                    <div className="space-y-2 text-sm text-slate-300">
                      <p className="flex items-center gap-2"><Clock size={16}/> 思考: {settings.timePerQuestion/10}秒</p>
                      <p className="flex items-center gap-2"><Heart size={16} className="text-rose-400"/> 生命: {settings.healthBonus > 0 ? `+${settings.healthBonus}` : settings.healthBonus}</p>
                      <p className="flex items-center gap-2"><Zap size={16} className="text-amber-400"/> 分數加成: {settings.scoreMultiplier}x</p>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* 模式選擇 */}
          {currentScreen === 'mode' && (
            <div className="max-w-4xl mx-auto p-6 pt-12 animate-in slide-in-from-right-8">
              <h2 className="text-3xl font-black mb-8 flex items-center gap-3 text-white">
                <Zap className="text-amber-400 w-8 h-8" /> Lesson {selectedLesson} - {DIFFICULTY_SETTINGS[selectedDifficulty].name}
              </h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {[
                  { id: 'recognition', title: '認讀挑戰', desc: '擊毀入侵的英文幽浮', icon: MousePointerClick, color: 'text-emerald-400', bg: 'bg-emerald-400/20', border: 'hover:border-emerald-400' },
                  { id: 'scramble', title: '字母重組', desc: '將打散的字母重新排列', icon: Shuffle, color: 'text-amber-400', bg: 'bg-amber-400/20', border: 'hover:border-amber-400' },
                  { id: 'spelling', title: '拼字測驗', desc: '聽發音完整拼出單字', icon: Keyboard, color: 'text-purple-400', bg: 'bg-purple-400/20', border: 'hover:border-purple-400' }

                  <button key={m.id} onClick={() => startGame(m.id)}

                    <p className="text-slate-400 text-sm leading-relaxed">{m.desc}</p>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* 遊戲進行中 */}
          {currentScreen === 'game' && (
            <div className="max-w-4xl mx-auto p-4 md:p-6 flex flex-col h-[calc(100vh-80px)] animate-in fade-in duration-300">
              <div className="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-slate-700 flex justify-between items-center mb-6 shadow-lg">
                <div className="flex gap-2">
                  <button onClick={() => setCurrentScreen('mode')} className="p-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-white"><ArrowLeft size={20} /></button>
                  <button onClick={() => setIsPaused(true)} className="p-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white"><Pause size={20} /></button>
                </div>
                <div className="flex items-center gap-6 font-mono">
                  <div className="text-center">
                    <div className="text-xs text-slate-400 font-bold">SCORE</div>
                    <div className="text-2xl font-black text-purple-400 neon-text">{score}</div>
                  </div>
                  <div className="text-center">
                    <div className="text-xs text-slate-400 font-bold">COMBO</div>
                    <div className={`text-2xl font-black flex items-center ${combo > 0 ? 'text-amber-400 neon-text' : 'text-slate-600'}`}>
                      <Zap size={20} className={combo > 0 ? 'fill-current' : ''} /> {combo}
                    </div>
                  </div>
                </div>
                <div className="flex gap-1 bg-slate-900 p-2 rounded-xl border border-slate-700">
                  {Array.from({ length: Math.max(3, lives) }).map((_, i) => (
                    <Heart key={i} className={`w-6 h-6 transition-all ${i < lives ? 'text-rose-500 fill-current drop-shadow-[0_0_8px_rgba(244,63,94,0.8)]' : 'text-slate-700'}`} />
                  ))}
                </div>
              </div>

              <div className="w-full bg-slate-900 rounded-full h-2 mb-6 border border-slate-700">
                <div className={`h-full rounded-full transition-all duration-100 ease-linear ${timeLeft > (DIFFICULTY_SETTINGS[selectedDifficulty].timePerQuestion * 0.5) ? 'bg-emerald-400 shadow-[0_0_10px_#34d399]' : timeLeft > (DIFFICULTY_SETTINGS[selectedDifficulty].timePerQuestion * 0.25) ? 'bg-amber-400 shadow-[0_0_10px_#fbbf24]' : 'bg-rose-500 shadow-[0_0_10px_#f43f5e]'}`}
                     style={{ width: `${(timeLeft / DIFFICULTY_SETTINGS[selectedDifficulty].timePerQuestion) * 100}%` }}></div>
              </div>

              <div className="flex-1 flex flex-col items-center justify-center bg-slate-800/50 backdrop-blur rounded-3xl p-6 md:p-10 border border-slate-600 relative overflow-hidden shadow-[0_0_30px_rgba(0,0,0,0.5)]">
                <div className="absolute top-4 right-6 text-slate-500 font-bold tracking-widest text-sm z-20">
                  {currentIndex + 1} / {gameWords.length}
                </div>

                {selectedMode !== 'recognition' && (
                  <>
                    <h2 className={`text-5xl md:text-7xl font-black mb-8 text-center text-white ${feedback === 'wrong' || feedback === 'timeout' ? 'animate-shake text-rose-500' : ''}`}>{gameWords[currentIndex]?.zh}</h2>
                    <button onClick={() => speakWord(gameWords[currentIndex].en)} className="mb-10 flex items-center gap-2 text-cyan-400 hover:text-cyan-300 bg-slate-900 border border-cyan-900 px-6 py-2 rounded-full font-bold">
                      <Volume2 size={20} /> 聆聽發音
                    </button>
                  </>
                )}

                <div className="w-full max-w-2xl">
                  {/* 認讀模式 (UFO) */}
                  {selectedMode === 'recognition' && (
                    <div className="relative w-full h-[400px] md:h-[450px] bg-slate-900 overflow-hidden border-2 border-slate-700 rounded-3xl mt-2 shadow-[inset_0_0_50px_rgba(0,0,0,0.8)]">
                      {options.map((opt, i) => {
                        const dropPercentage = Math.max(0, Math.min(85, ((DIFFICULTY_SETTINGS[selectedDifficulty].timePerQuestion - timeLeft) / DIFFICULTY_SETTINGS[selectedDifficulty].timePerQuestion) * 85));
                        const isShot = shotAnswer === opt.en;
                        const isCorrect = opt.en === gameWords[currentIndex].en;
                        let enemyState = "alive";
                        if (feedback) {
                          if (isCorrect && (feedback === 'correct' || feedback === 'timeout')) enemyState = "destroyed";
                          else if (isShot && feedback === 'wrong') enemyState = "shielded";
                        }
                        return (
                          <button key={i} onClick={() => handleAnswer(opt.en)} disabled={feedback !== null || isPaused}
                            className={`absolute transform -translate-x-1/2 flex flex-col items-center transition-all duration-200 z-10 ${enemyState === 'destroyed' ? 'scale-150 opacity-0 duration-500' : enemyState === 'shielded' ? 'animate-shake' : 'hover:scale-110 hover:-translate-y-2'}`}
                            style={{ left: `${12.5 + i * 25}%`, top: `${dropPercentage}%` }}
                          >
                            {enemyState === 'destroyed' ? (
                              <div className="w-20 h-20 bg-orange-500 rounded-full blur-xl animate-pulse"></div>
                            ) : (
                              <>
                                <div className={`w-14 h-14 mb-2 rounded-full flex items-center justify-center border-2 transition-colors ${enemyState === 'shielded' ? 'bg-rose-900 border-rose-500 shadow-[0_0_20px_#f43f5e]' : 'bg-slate-800 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.5)]'}`}>
                                  {enemyState === 'shielded' ? <Shield size={28} className="text-rose-500" /> : <Rocket size={28} className="text-cyan-400 transform rotate-180" />}
                                </div>
                                <span className={`bg-slate-900 text-white font-bold px-3 py-1 rounded-lg border shadow-md ${enemyState === 'shielded' ? 'border-rose-500' : 'border-slate-600'}`}>{opt.en}</span>
                              </>
                            )}
                            {isShot && enemyState !== 'destroyed' && <div className="absolute top-16 w-2 h-[500px] bg-rose-500 shadow-[0_0_15px_#f43f5e] origin-top animate-pulse -z-10"></div>}
                            {isShot && enemyState === 'destroyed' && <div className="absolute top-16 w-3 h-[500px] bg-cyan-400 shadow-[0_0_20px_#22d3ee] origin-top animate-pulse -z-10"></div>}
                          </button>
                        );
                      })}
                      <div className="absolute bottom-0 left-0 w-full flex flex-col items-center z-20 pointer-events-none">
                        <div className={`w-full h-1 blur-sm mb-1 ${feedback === 'wrong' || feedback === 'timeout' ? 'bg-rose-500' : 'bg-cyan-500/30'}`}></div>
                        <div className={`w-4/5 md:w-3/5 px-6 py-4 rounded-t-3xl border-t-4 border-l-4 border-r-4 flex flex-col items-center justify-center transition-colors ${feedback === 'wrong' || feedback === 'timeout' ? 'bg-rose-950/90 border-rose-600 shadow-[0_-10px_40px_rgba(225,29,72,0.6)]' : feedback === 'correct' ? 'bg-emerald-950/90 border-emerald-500' : 'bg-slate-900/90 border-cyan-600 shadow-[0_-10px_30px_rgba(34,211,238,0.3)]'}`}>
                          <Crosshair size={32} className={`mb-2 animate-pulse ${feedback === 'wrong' || feedback === 'timeout' ? 'text-rose-500' : feedback === 'correct' ? 'text-emerald-400' : 'text-cyan-400'}`} />
                          <span className="text-3xl md:text-5xl font-black text-white tracking-widest drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">{gameWords[currentIndex]?.zh}</span>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 字母重組模式 */}
                  {selectedMode === 'scramble' && (
                    <div className="flex flex-col items-center w-full">
                      <div className="flex flex-wrap justify-center gap-2 mb-8 min-h-[72px] p-4 rounded-2xl bg-slate-900/80 w-full border border-slate-700 shadow-inner">
                        {scrambleTiles.filter(t => t.selectedIndex !== null).sort((a, b) => a.selectedIndex - b.selectedIndex).map((t) => (
                          <button key={t.id} onClick={() => toggleScrambleTile(t.id)} disabled={feedback !== null || isPaused} className="w-12 h-12 md:w-14 md:h-14 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl text-2xl font-bold flex items-center justify-center transform hover:scale-105 shadow-[0_0_10px_rgba(34,211,238,0.4)]">
                            {t.char}
                          </button>
                        ))}
                      </div>
                      <div className="flex flex-wrap justify-center gap-3">
                        {scrambleTiles.map((t) => (
                          <button key={t.id} onClick={() => {
                            if(feedback!==null || isPaused) return;
                            setScrambleTiles(tiles => {
                              let newTiles;
                              if (t.selectedIndex !== null) newTiles = tiles.map(x => x.id === t.id ? { ...x, selectedIndex: null } : x);
                              else {
                                const maxIndex = Math.max(-1, ...tiles.map(x => x.selectedIndex !== null ? x.selectedIndex : -1));
                                newTiles = tiles.map(x => x.id === t.id ? { ...x, selectedIndex: maxIndex + 1 } : x);
                              }
                              const selectedOrdered = newTiles.filter(x => x.selectedIndex !== null).sort((a, b) => a.selectedIndex - b.selectedIndex);
                              const currentSelected = selectedOrdered.map(x => x.char).join('');
                              if (currentSelected.length === gameWords[currentIndex].en.length) handleAnswer(currentSelected);
                              return newTiles;
                            });
                          }} disabled={t.selectedIndex !== null || feedback !== null || isPaused} 
                            className={`w-12 h-12 md:w-14 md:h-14 rounded-xl text-2xl font-bold flex items-center justify-center transition-all ${t.selectedIndex !== null ? 'bg-slate-900 opacity-30 border border-slate-700' : 'bg-slate-700 text-white border-b-4 border-slate-900 hover:-translate-y-1'}`}>
                            {t.selectedIndex !== null ? '' : t.char}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* 拼字測驗模式 */}
                  {selectedMode === 'spelling' && (
                    <div className="w-full flex flex-col gap-4">
                      <form onSubmit={(e) => { e.preventDefault(); handleAnswer(spellingInput); }} className="w-full relative">
                        <input ref={inputRef} type="text" value={spellingInput} onChange={(e) => setSpellingInput(e.target.value)} disabled={feedback !== null || isPaused} placeholder={`請拼出英文 (${gameWords[currentIndex]?.en.length} 個字母)`}
                          className="w-full text-center text-3xl font-bold p-6 rounded-2xl bg-slate-900/80 text-white border-2 border-slate-600 focus:border-cyan-400 focus:outline-none focus:ring-4 focus:ring-cyan-500/30 shadow-[inset_0_0_20px_rgba(0,0,0,0.5)] transition-all" autoComplete="off" spellCheck="false" />
                        <button type="submit" disabled={!spellingInput || feedback !== null || isPaused} className="absolute right-4 top-1/2 -translate-y-1/2 bg-cyan-600 hover:bg-cyan-500 disabled:opacity-50 text-white p-3 rounded-xl shadow-lg">
                          <ArrowRight size={24} />
                        </button>
                      </form>
                      <p className="text-center text-slate-500 font-bold">輸入完畢請按 Enter 鍵送出</p>
                    </div>

                </div>

                <div className={`mt-8 min-h-[64px] flex items-center justify-center w-full max-w-lg rounded-2xl transition-opacity duration-300 p-4 ${feedback === 'correct' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50' : feedback === 'wrong' || feedback === 'timeout' ? 'bg-rose-500/20 text-rose-400 border border-rose-500/50' : 'opacity-0'}`}>

                  {feedback === 'wrong' && <div className="flex items-center gap-2 text-xl font-bold"><X size={32} /> 答錯了！正確答案：<span className="text-2xl text-white ml-1">{gameWords[currentIndex]?.en}</span></div>}
                  {feedback === 'timeout' && <div className="flex items-center gap-2 text-xl font-bold"><Clock size={32} /> 時間到！正確答案：<span className="text-2xl text-white ml-1">{gameWords[currentIndex]?.en}</span></div>}
                </div>
              </div>
            </div>
          )}

          {/* 暫停選單 */}

                <Pause size={64} className="text-cyan-400 mx-auto mb-4" />
                <h2 className="text-3xl font-black mb-8 text-white">遊戲暫停</h2>
                <div className="flex flex-col gap-4">
                  <button onClick={() => { setIsPaused(false); if(selectedMode === 'spelling') setTimeout(() => inputRef.current?.focus(), 100); }} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(34,211,238,0.5)]">繼續遊戲</button>
                  <button onClick={() => { setIsPaused(false); setCurrentScreen('mode'); }} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl">返回選單</button>
                </div>
              </div>
            </div>
          )}

          {/* 遊戲結果結算頁面 */}
          {currentScreen === 'result' && (
            <div className="flex items-center justify-center min-h-[calc(100vh-80px)] p-6 animate-in zoom-in-95">
              <div className="neon-border-amber p-10 rounded-3xl bg-slate-800/80 backdrop-blur max-w-md w-full text-center shadow-[0_0_50px_rgba(245,158,11,0.2)]">
                <h2 className="text-4xl font-black text-white mb-2">{lives > 0 ? '挑戰成功！' : 'Game Over'}</h2>
                <p className="text-amber-400 mb-6 font-bold">L{selectedLesson} - {DIFFICULTY_SETTINGS[selectedDifficulty].name}</p>
                
                <div className="bg-slate-900 rounded-3xl py-8 mb-6 border border-slate-700">
                  <div className="text-slate-400 font-bold mb-2">本次得分</div>
                  <div className="text-6xl font-black text-purple-400 neon-text">{score}</div>
                  <div className="flex justify-center gap-2 mt-6 pt-4 w-4/5 mx-auto border-t border-slate-700">
                    {Array.from({ length: 3 }).map((_, i) => (
                      <Star key={i} size={36} className={i < (lives > 0 ? Math.min(lives,3) : 0) ? 'text-amber-400 fill-current drop-shadow-[0_0_10px_rgba(251,191,36,0.8)]' : 'text-slate-700'} />
                    ))}
                  </div>
                </div>

                {wrongWords.length > 0 && (
                  <div className="text-left mb-6 p-4 rounded-xl border border-rose-500/30 bg-rose-500/10">
                    <p className="font-bold mb-2 text-rose-400">需要複習的單字：</p>
                    <div className="text-sm space-y-1">
                      {wrongWords.slice(0, 5).map((w, i) => (
                        <p key={i} className="flex justify-between text-slate-200"><span className="font-bold">{w.en}</span> <span className="opacity-80">{w.zh}</span></p>
                      ))}
                      {wrongWords.length > 5 && <p className="text-xs text-rose-400 text-center mt-2">... 還有 {wrongWords.length - 5} 個未列出</p>}
                    </div>
                  </div>
                )}

                <div className="flex flex-col gap-3">
                  <button onClick={() => startGame(selectedMode)} className="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 rounded-xl shadow-lg">再來一次</button>
                  <button onClick={() => setCurrentScreen('mode')} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl">更換模式</button>
                </div>
              </div>
            </div>
          )}

          {/* 商店系統 */}
          {currentScreen === 'store' && (
            <div className="max-w-5xl mx-auto p-6 pt-12 animate-in fade-in">
              <h2 className="text-3xl font-black mb-8 flex items-center gap-3 text-white">
                <ShoppingCart className="text-amber-400" size={32}/> 星星商店
              </h2>
              <div className="bg-amber-400/10 border border-amber-400/50 rounded-xl p-4 mb-8 inline-block">
                可用星星餘額：<span className="font-black text-amber-400 text-xl ml-2">{currentStudent.starsBalance}</span> ⭐
              </div>
              
              <h3 className="text-xl font-bold text-slate-300 mb-4 border-b border-slate-700 pb-2">自訂主題</h3>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                {Object.values(ITEMS).filter(i => i.type === 'theme').map(item => {
                  const isUnlocked = currentStudent.unlockedItems.includes(item.id);
                  const isEquipped = currentStudent.equippedTheme === item.id;
                  return (
                    <div key={item.id} className={`bg-slate-800 p-6 rounded-2xl border ${isEquipped ? 'border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.3)]' : 'border-slate-700'}`}>
                      <div className="text-4xl mb-4">{item.icon}</div>
                      <h4 className="text-lg font-bold text-white mb-2">{item.name}</h4>
                      {isUnlocked ? (
                        <button onClick={() => equipItem(item.id, 'theme')} className={`w-full py-2 rounded-lg font-bold ${isEquipped ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/50' : 'bg-slate-700 text-white hover:bg-slate-600'}`}>{isEquipped ? '裝備中' : '裝備'}</button>
                      ) : (
                        <button onClick={() => buyItem(item.id, item.price)} className={`w-full py-2 rounded-lg font-bold flex justify-center items-center gap-2 ${currentStudent.starsBalance >= item.price ? 'bg-amber-500 hover:bg-amber-400 text-white' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}`}>
                          <Lock size={16}/> 購買 ({item.price} ⭐)
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>

              <h3 className="text-xl font-bold text-slate-300 mb-4 border-b border-slate-700 pb-2">專屬頭貼</h3>
              <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                {Object.values(ITEMS).filter(i => i.type === 'avatar').map(item => {
                  const isUnlocked = currentStudent.unlockedItems.includes(item.id);
                  const isEquipped = currentStudent.equippedAvatar === item.id;
                  return (
                    <div key={item.id} className={`bg-slate-800 p-6 rounded-2xl border ${isEquipped ? 'border-cyan-400' : 'border-slate-700'}`}>
                      <div className="text-5xl mb-4 text-center">{item.icon}</div>
                      <h4 className="text-md font-bold text-white mb-4 text-center">{item.name}</h4>
                      {isUnlocked ? (
                        <button onClick={() => equipItem(item.id, 'avatar')} className={`w-full py-2 rounded-lg font-bold text-sm ${isEquipped ? 'bg-cyan-500/20 text-cyan-400' : 'bg-slate-700 text-white hover:bg-slate-600'}`}>{isEquipped ? '使用中' : '更換'}</button>
                      ) : (
                        <button onClick={() => buyItem(item.id, item.price)} className={`w-full py-2 rounded-lg font-bold text-sm flex justify-center items-center gap-1 ${currentStudent.starsBalance >= item.price ? 'bg-amber-500 text-white' : 'bg-slate-700 text-slate-500'}`}>
                          <Lock size={14}/> {item.price} ⭐
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 統計資料 */}
          {currentScreen === 'stats' && (
            <div className="max-w-5xl mx-auto p-6 pt-12 animate-in fade-in">
              <h2 className="text-3xl font-black mb-8 flex items-center gap-3 text-white">
                <BarChart3 className="text-emerald-400" size={32}/> 學習統計
              </h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                  <div className="text-slate-400 text-sm font-bold mb-2">總分數</div>
                  <div className="text-3xl font-black text-purple-400">{currentStudent.totalScore}</div>
                </div>
                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                  <div className="text-slate-400 text-sm font-bold mb-2">獲得星星</div>
                  <div className="text-3xl font-black text-amber-400">{currentStudent.totalStars} <span className="text-lg text-slate-600">/ 360</span></div>
                </div>
                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                  <div className="text-slate-400 text-sm font-bold mb-2">遊玩局數</div>
                  <div className="text-3xl font-black text-cyan-400">{currentStudent.gameHistory?.length || 0}</div>
                </div>
                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                  <div className="text-slate-400 text-sm font-bold mb-2">總勝率</div>
                  <div className="text-3xl font-black text-emerald-400">
                    {currentStudent.gameHistory?.length > 0 
                      ? Math.round((currentStudent.gameHistory.filter(g => g.won).length / currentStudent.gameHistory.length) * 100) 
                      : 0}%
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 成就系統 */}
          {currentScreen === 'achievements' && (
            <div className="max-w-5xl mx-auto p-6 pt-12 animate-in fade-in">
              <h2 className="text-3xl font-black mb-8 flex items-center gap-3 text-white">
                <Trophy className="text-purple-400" size={32}/> 榮譽徽章
              </h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {Object.values(ACHIEVEMENTS).map(ach => {
                  const unlocked = currentStudent.achievements.includes(ach.id);
                  return (
                    <div key={ach.id} className={`p-6 rounded-2xl border-2 flex items-center gap-4 transition-all ${unlocked ? 'bg-purple-900/30 border-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.2)]' : 'bg-slate-800/50 border-slate-700 opacity-60'}`}>
                      <div className="text-4xl">{ach.icon}</div>
                      <div className="flex-1">
                        <h3 className={`font-bold text-lg ${unlocked ? 'text-white' : 'text-slate-400'}`}>{ach.name}</h3>
                        <p className="text-sm text-slate-400">{ach.desc}</p>
                      </div>
                      {unlocked && <Check size={28} className="text-purple-400" />}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
