    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.6), inset 0 0 15px rgba(59, 130, 246, 0.3); }

    }
    .pulse-glow { animation: pulse-glow 2s infinite; }
    
    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .slide-up { animation: slide-up 0.5s ease-out; }
    
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      50% { opacity: 1; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .bounce-in { animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.5s; }

    @keyframes spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spin-slow { animation: spin-slow 4s linear infinite; }

      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {

        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    };

    const speakWord = (word, lang = 'en-US') => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = lang;
        utterance.rate = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = voices.find(v => v.lang.includes(lang) && (v.name.includes('Google') || v.name.includes('Samantha'))) || voices.find(v => v.lang.includes('en-')) || voices[0];
        if (bestVoice) utterance.voice = bestVoice;
        window.speechSynthesis.speak(utterance);
      }
    };

    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioContext = new AudioContext();
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        const soundMap = {
          correct: { freq: 800, duration: 0.2 },
          wrong: { freq: 300, duration: 0.3 },
          levelup: { freq: 1200, duration: 0.4 }
        };
        
        const sound = soundMap[type] || soundMap.correct;
        oscillator.frequency.value = sound.freq;
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + sound.duration);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + sound.duration);
      } catch (e) {
        console.log("Audio play prevented or not supported");
      }
    };

                        {stars > 0 && (
                          <div className="absolute top-2 right-2 text-xs font-bold flex items-center gap-0.5 text-amber-400 bg-slate-900/80 px-1.5 py-0.5 rounded-full border border-slate-700">
                            {stars}<Star className="w-3 h-3 fill-current"/>
                          </div>
                        )}
                      </button>
                    )
                  })}
                </div>
              </>
            ) : (
              <div className="animate-in fade-in slide-in-from-bottom-4">
                <div className="flex items-center gap-4 mb-8">
                  <button onClick={() => onSelectLesson(null)} className="p-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-slate-300">
                    <ArrowLeft size={20} />
                  </button>
                  <h3 className="text-3xl font-extrabold text-white flex items-center gap-3">
                    <Target className="text-rose-500" /> Lesson {selectedLesson} - 選擇難度
                  </h3>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                  {Object.entries(DIFFICULTY_SETTINGS).map(([key, settings]) => (
                    <button
                      key={key}
                      onClick={() => {
                        onSelectDifficulty(key);
                        onNavigate('mode-select');
                      }}
                      className="bg-slate-800 p-8 rounded-3xl border border-slate-700 hover:border-rose-500 transition-all shadow-lg hover:shadow-rose-500/20 text-left group transform hover:-translate-y-2 relative overflow-hidden"
                    >
                      <div className={`absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl ${settings.color} opacity-10 rounded-bl-full`}></div>
                      
                      <h3 className="text-3xl font-black mb-4 flex items-center gap-3 text-white group-hover:text-rose-400 transition-colors">
                        {key === 'easy' && <span>🎯</span>}
                        {key === 'normal' && <span>⚡</span>}
                        {key === 'hard' && <span>🔥</span>}
                        {settings.name}
                      </h3>
                      
                      <div className="space-y-3">
                        <div className="flex items-center justify-between bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                           <span className="text-slate-400 flex items-center gap-2"><Clock className="w-4 h-4"/> 思考時間</span>
                           <span className="font-bold text-white">{settings.timePerQuestion/10}秒</span>
                        </div>
                        <div className="flex items-center justify-between bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                           <span className="text-slate-400 flex items-center gap-2"><Heart className="w-4 h-4 text-rose-500"/> 生命獎勵</span>
                           <span className="font-bold text-white">{settings.healthBonus > 0 ? `+${settings.healthBonus}` : settings.healthBonus}</span>
                        </div>
                        <div className="flex items-center justify-between bg-slate-900/50 p-3 rounded-xl border border-slate-700/50">
                           <span className="text-slate-400 flex items-center gap-2"><Zap className="w-4 h-4 text-amber-500"/> 分數加成</span>
                           <span className="font-bold text-amber-400">{settings.scoreMultiplier}x</span>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ========== 模式選擇 ==========
    const ModeSelectScreen = ({ selectedLesson, selectedDifficulty, onNavigate, onSelectMode }) => {
      const diffName = DIFFICULTY_SETTINGS[selectedDifficulty].name;
      
      return (
         <div className="p-6 h-[calc(100vh-80px)] overflow-y-auto custom-scrollbar animate-in slide-in-from-right-8 duration-300">
            <div className="max-w-5xl mx-auto">
               <button onClick={() => onNavigate('lesson-select')} className="mb-6 p-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-slate-300 hover:text-white flex items-center gap-2 transition-all w-fit">
                 <ArrowLeft className="w-5 h-5"/> 返回難度選擇
               </button>
               
               <div className="mb-8">
                 <h2 className="text-3xl font-extrabold text-white mb-2 flex items-center gap-3">
                   <Zap className="text-amber-400 fill-current" /> Lesson {selectedLesson} 挑戰模式
                 </h2>
                 <p className="text-slate-400 text-lg">當前難度: <span className="text-rose-400 font-bold">{diffName}</span>。準備好就開始吧！</p>
               </div>
               
               <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                 {[
                   { id: 'recognition', icon: MousePointerClick, title: '認讀挑戰', desc: '看到中文，擊毀入侵的英文幽浮。防禦基地！', color: 'emerald' },
                   { id: 'scramble', icon: Shuffle, title: '字母重組', desc: '將打散的字母磚塊重新排列成正確單字。', color: 'amber' },
                   { id: 'spelling', icon: Keyboard, title: '拼字測驗', desc: '聽發音並看中文，親手完整拼出英文字。', color: 'indigo' }
                 ].map(m => (
                    <button 
                      key={m.id} 
                      onClick={() => {
                        onSelectMode(m.id);
                        onNavigate('game');
                      }} 
                      className={`bg-slate-800 border-2 border-slate-700 hover:border-${m.color}-500 group p-8 rounded-3xl text-left transition-all duration-300 shadow-lg hover:shadow-[0_0_30px_rgba(var(--color-${m.color}-500),0.2)] hover:-translate-y-2`}
                    >
                      <div className={`bg-${m.color}-500/20 p-4 rounded-2xl w-fit mb-6 text-${m.color}-400 group-hover:bg-${m.color}-500 group-hover:text-white transition-colors border border-${m.color}-500/30`}>
                        <m.icon className="w-8 h-8" />
                      </div>
                      <h3 className="text-2xl font-bold mb-3 text-white">{m.title}</h3>
                      <p className="text-slate-400 leading-relaxed">{m.desc}</p>
                    </button>
                 ))}
               </div>
            </div>
         </div>
      );
    }

    // ========== 遊戲進行畫面 (結合 UI 與完整邏輯) ==========
    const GameScreen = ({ student, onNavigate, onUpdateStudent, selectedLesson, selectedMode, selectedDifficulty }) => {
      
      const [gameWords, setGameWords] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [lives, setLives] = useState(3);
      const [combo, setCombo] = useState(0);
      const [timeLeft, setTimeLeft] = useState(100);
      const [isPaused, setIsPaused] = useState(false);
      
      const [feedback, setFeedback] = useState(null);
      const [options, setOptions] = useState([]);
      const [scrambleTiles, setScrambleTiles] = useState([]);
      const [spellingInput, setSpellingInput] = useState('');
      const [shotAnswer, setShotAnswer] = useState(null);
      const [wrongWords, setWrongWords] = useState([]);
      const [showResult, setShowResult] = useState(false);
      
      const inputRef = useRef(null);
      const diffSettings = DIFFICULTY_SETTINGS[selectedDifficulty];

      // 初始化遊戲
      useEffect(() => {
         const words = shuffleArray(VOCAB_800[selectedLesson]).slice(0, 20);
         setGameWords(words);
         setCurrentIndex(0);
         setScore(0);
         setLives(3 + diffSettings.healthBonus);
         setCombo(0);
         setFeedback(null);
         setShotAnswer(null);
         setWrongWords([]);
         setShowResult(false);
         setIsPaused(false);
         if(words.length > 0) {
            setupQuestion(words[0], selectedMode, words);
         }
      }, [selectedLesson, selectedMode, selectedDifficulty]);

      // 計時器邏輯
      useEffect(() => {
        let timer;
        if (!isPaused && feedback === null && timeLeft > 0 && !showResult && gameWords.length > 0) {
          timer = setInterval(() => {
            setTimeLeft((prev) => {
              if (prev <= 1) {
                clearInterval(timer);
                handleAnswer('', true);
                return 0;
              }
              return prev - 1;
            });
          }, 100);
        }
        return () => clearInterval(timer);
      }, [isPaused, feedback, timeLeft, showResult, gameWords]);

      const setupQuestion = (word, mode, allWords) => {
        setFeedback(null);
        setShotAnswer(null);
        setTimeLeft(diffSettings.timePerQuestion);
        
        if (mode === 'recognition') {
          const wrongOptions = allWords.filter(w => w.en !== word.en).sort(() => 0.5 - Math.random()).slice(0, 3);
          setOptions(shuffleArray([word, ...wrongOptions]));
        } else if (mode === 'scramble') {
          const chars = word.en.split('');
          let shuffledChars = shuffleArray(chars);
          while(shuffledChars.join('') === word.en && word.en.length > 1) {
            shuffledChars = shuffleArray(chars);
          }
          setScrambleTiles(shuffledChars.map((char, index) => ({ id: index, char, selectedIndex: null })));
          setSpellingInput('');
        } else if (mode === 'spelling') {
          setSpellingInput('');
          setTimeout(() => inputRef.current?.focus(), 100);
          speakWord(word.en);
        }
      };

      const handleAnswer = (answer, isTimeout = false) => {
        if (feedback !== null || showResult) return;
        
        const currentWord = gameWords[currentIndex];
        let isCorrect = false;

        if (!isTimeout) {
          if (selectedMode === 'recognition') {
            setShotAnswer(answer);
            isCorrect = answer === currentWord.en;
          } else {
            isCorrect = answer.trim().toLowerCase() === currentWord.en.toLowerCase();
          }
        }

        if (isCorrect) {
          const timeBonus = Math.floor(timeLeft / 10);
          const comboBonus = combo * 5;
          const totalScore = Math.floor((10 + timeBonus + comboBonus) * diffSettings.scoreMultiplier);
          setScore(s => s + totalScore);
          setCombo(c => c + 1);
          setFeedback('correct');
          if (student.soundEnabled) playSound('correct');
          speakWord(currentWord.en);
        } else {
          setLives(l => l - 1);
          setCombo(0);
          setFeedback(isTimeout ? 'timeout' : 'wrong');
          if (student.soundEnabled) playSound('wrong');
          setWrongWords(prev => {
            if (!prev.find(w => w.en === currentWord.en)) {
              return [...prev, currentWord];
            }
            return prev;
          });
        }

        setTimeout(() => {
          setLives((currentLives) => {
            if (currentLives <= 0) {
              processGameOver(false, 0); // 傳入 currentLives 為 0
              return 0;
            } else {
              if (currentIndex + 1 < gameWords.length) {
                setCurrentIndex(i => i + 1);
                setupQuestion(gameWords[currentIndex + 1], selectedMode, gameWords);
              } else {
                processGameOver(true, currentLives);
              }
              return currentLives;
            }
          });
        }, 1500);
      };

      const processGameOver = (won, finalLives) => {
        const earnedStars = finalLives > 0 ? Math.min(finalLives, 3) : 0;
        
        const lessonKey = `L${selectedLesson}_${selectedMode}`;
        const previousStars = student.lessonStars[lessonKey] || 0;
        
        const updates = {
           totalScore: student.totalScore + score,
           gameHistory: [...student.gameHistory, {
              lesson: selectedLesson,
              mode: selectedMode,
              score: score,
              stars: earnedStars,
              won: won,
              date: new Date().toISOString(),
              difficulty: selectedDifficulty
           }]
        };

        if (earnedStars > previousStars) {
           updates.lessonStars = { ...student.lessonStars, [lessonKey]: earnedStars };
           updates.totalStars = student.totalStars + (earnedStars - previousStars);
        } else {
           updates.totalStars = student.totalStars; // 保留原始星星數便於後續成就計算
        }

        // 成就檢查
        const newAchievements = [...student.achievements];
        const totalGames = updates.gameHistory.length;
        
        if (totalGames >= 1 && !newAchievements.includes('first_win')) newAchievements.push('first_win');
        if (totalGames >= 10 && !newAchievements.includes('ten_wins')) {
            // 簡單檢查最近10場是否都贏
            const last10 = updates.gameHistory.slice(-10);
            if (last10.length === 10 && last10.every(g => g.won)) newAchievements.push('ten_wins');
        }
        if (updates.totalStars >= 50 && !newAchievements.includes('collector')) newAchievements.push('collector');
        if (updates.totalStars >= 200 && !newAchievements.includes('scholar')) newAchievements.push('scholar');
        if (won && finalLives >= 3 && !newAchievements.includes('perfect_game')) newAchievements.push('perfect_game');
        
        // 檢查全能戰士 (玩過三種模式)
        if(!newAchievements.includes('all_modes')) {
           const playedModes = new Set(updates.gameHistory.map(g => g.mode));
           if(playedModes.has('recognition') && playedModes.has('scramble') && playedModes.has('spelling')) {
              newAchievements.push('all_modes');
           }
        }

        updates.achievements = newAchievements;
        
        onUpdateStudent(updates);
        setShowResult(true);
      };

      const toggleScrambleTile = (id) => {
        if (feedback !== null || isPaused || showResult) return;
        setScrambleTiles(tiles => {
          const clickedTile = tiles.find(t => t.id === id);
          let newTiles;

          if (clickedTile.selectedIndex !== null) {
            newTiles = tiles.map(t => t.id === id ? { ...t, selectedIndex: null } : t);
          } else {
            const maxIndex = Math.max(-1, ...tiles.map(t => t.selectedIndex !== null ? t.selectedIndex : -1));
            newTiles = tiles.map(t => t.id === id ? { ...t, selectedIndex: maxIndex + 1 } : t);
          }

          const selectedOrdered = newTiles.filter(t => t.selectedIndex !== null).sort((a, b) => a.selectedIndex - b.selectedIndex);
          const currentSelected = selectedOrdered.map(t => t.char).join('');
          setSpellingInput(currentSelected);
          
          if (currentSelected.length === gameWords[currentIndex].en.length) {
            handleAnswer(currentSelected);
          }
          return newTiles;
        });
      };

      if (gameWords.length === 0) return <div className="text-white text-center mt-20">載入中...</div>;

      // 如果遊戲結束，顯示結果畫面
      if (showResult) {
         return (
            <div className="flex flex-col items-center justify-center h-full p-6 animate-in zoom-in-95 duration-500 z-10 relative">
               <div className="bg-slate-800/90 backdrop-blur p-8 md:p-12 rounded-3xl shadow-2xl max-w-lg w-full text-center border-t-8 border-amber-500 relative overflow-hidden neon-border">
                 <div className="absolute top-0 right-0 w-32 h-32 bg-amber-500/20 rounded-full blur-2xl pointer-events-none"></div>

                 <h2 className="text-4xl font-black mb-2 text-white">{lives > 0 ? '🎉 挑戰完成！' : '💀 Game Over'}</h2>
                 <p className="text-cyan-300 mb-6 font-medium">Lesson {selectedLesson} - {DIFFICULTY_SETTINGS[selectedDifficulty].name} {selectedMode==='recognition'?'認讀':selectedMode==='scramble'?'重組':'拼字'}</p>
                 
                 <div className={`bg-slate-900/80 rounded-3xl w-full py-8 mb-6 border border-slate-700 relative z-10 flex flex-col items-center shadow-inner`}>
                   <span className="text-slate-400 uppercase font-bold tracking-widest mb-2">本次得分</span>
                   <span className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-orange-500 drop-shadow-md">{score}</span>
                   <div className="flex justify-center gap-2 mt-6 pt-4 w-4/5 mx-auto border-t border-slate-700/50">
                     {Array.from({ length: 3 }).map((_, i) => (
                       <Star key={i} className={`w-10 h-10 ${i < (lives > 0 ? Math.min(lives,3) : 0) ? 'text-amber-400 fill-current drop-shadow-[0_0_10px_rgba(251,191,36,0.8)]' : 'text-slate-700'}`} />
                     ))}
                   </div>
                 </div>
                 
                 {wrongWords.length > 0 && (
                   <div className="text-left mb-6 p-4 rounded-2xl border border-rose-500/30 bg-rose-500/10 max-h-48 overflow-y-auto custom-scrollbar">
                     <p className="font-bold mb-3 text-rose-400 flex items-center gap-2"><Brain className="w-5 h-5"/> 建議複習單字：</p>
                     <div className="text-sm space-y-2">
                       {wrongWords.map((w, i) => (
                         <div key={i} className="flex justify-between items-center bg-slate-900/50 p-2 rounded-lg border border-slate-700/50">
                           <span className="font-bold text-white text-base">{w.en}</span> 
                           <span className="text-slate-300">{w.zh}</span>
                         </div>
                       ))}
                     </div>
                   </div>
                 )}

                 <div className="flex flex-col gap-3 relative z-10">
                   <button onClick={() => {
                     // Restart game logic
                     const words = shuffleArray(VOCAB_800[selectedLesson]).slice(0, 20);
                     setGameWords(words);
                     setCurrentIndex(0);
                     setScore(0);
                     setLives(3 + diffSettings.healthBonus);
                     setCombo(0);
                     setFeedback(null);
                     setShotAnswer(null);
                     setWrongWords([]);
                     setShowResult(false);
                     setIsPaused(false);
                     setupQuestion(words[0], selectedMode, words);
                   }} className="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                     <RotateCcw className="w-5 h-5" /> 再玩一次
                   </button>
                   <button onClick={() => onNavigate('mode-select')} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 px-6 rounded-xl border border-slate-600 transition-all">
                     選擇其他模式
                   </button>
                   <button onClick={() => onNavigate('home')} className="w-full text-slate-400 hover:text-white font-bold py-3 transition-colors">
                     返回首頁
                   </button>
                 </div>
               </div>
            </div>
         );
      }

      return (
         <div className="w-full h-full flex flex-col p-2 md:p-4 animate-in fade-in duration-300 z-10 relative">
            {/* HUD */}
            <div className="bg-slate-800/80 backdrop-blur-md p-4 rounded-2xl shadow-lg border border-cyan-500/30 flex flex-wrap justify-between items-center mb-4 gap-4 z-20">
               <div className="flex gap-2">
                 <button onClick={() => onNavigate('mode-select')} className="p-2 bg-slate-700/80 hover:bg-slate-600 rounded-xl transition-colors border border-slate-600" title="放棄返回">
                   <ArrowLeft className="w-6 h-6 text-white" />
                 </button>
                 <button onClick={() => setIsPaused(true)} className="p-2 bg-cyan-600/80 hover:bg-cyan-500 rounded-xl text-white transition-colors border border-cyan-500" title="暫停遊戲">
                   <Pause className="w-6 h-6" />
                 </button>
               </div>

               <div className="flex items-center gap-6 font-mono">
                 <div className="flex flex-col items-center bg-slate-900/80 px-4 py-1 rounded-xl border border-slate-700">
                   <span className="text-cyan-400 text-[10px] uppercase font-bold tracking-wider">Score</span>
                   <span className="text-2xl font-black text-white">{score}</span>
                 </div>
                 <div className="flex flex-col items-center bg-slate-900/80 px-4 py-1 rounded-xl border border-slate-700">
                   <span className="text-amber-400 text-[10px] uppercase font-bold tracking-wider">Combo</span>
                   <span className={`text-2xl font-black flex items-center ${combo > 0 ? 'text-amber-400' : 'text-slate-600'}`}>
                     <Flame className={`w-5 h-5 mr-1 ${combo > 0 ? 'fill-current' : ''}`} /> {combo}
                   </span>
                 </div>
               </div>

               <div className="flex gap-1 bg-slate-900/80 p-2 rounded-xl border border-slate-700 shadow-inner">
                 {Array.from({ length: Math.max(3, lives) }).map((_, i) => (
                   <Heart key={i} className={`w-7 h-7 transition-all duration-300 ${i < lives ? 'text-rose-500 fill-current drop-shadow-[0_0_8px_rgba(244,63,94,0.6)]' : 'text-slate-700'}`} />
                 ))}
               </div>
            </div>

            {/* 計時條 */}
            <div className="w-full bg-slate-900/80 rounded-full h-3 mb-4 overflow-hidden border border-slate-700 shadow-inner relative z-20">
               <div
                 className={`h-full rounded-full transition-all duration-100 ease-linear ${
                   timeLeft > (diffSettings.timePerQuestion * 0.5) ? 'bg-gradient-to-r from-emerald-500 to-green-400' : 
                   timeLeft > (diffSettings.timePerQuestion * 0.25) ? 'bg-gradient-to-r from-amber-500 to-yellow-400' : 'bg-gradient-to-r from-rose-600 to-red-500'
                 }`}
                 style={{ width: `${(timeLeft / diffSettings.timePerQuestion) * 100}%` }}
               ></div>
            </div>

            {/* 遊戲主顯示區 */}
            <div className="flex-1 flex flex-col items-center justify-center bg-slate-800/60 backdrop-blur rounded-3xl p-4 md:p-8 border border-slate-700/50 relative overflow-hidden shadow-2xl z-20">
               
               <div className="absolute top-4 right-6 text-cyan-500/50 font-black tracking-widest text-lg z-20">
                 {currentIndex + 1} <span className="text-sm">/ {gameWords.length}</span>
               </div>

               {selectedMode !== 'recognition' && (
                 <>
                   <h2 className={`text-5xl md:text-7xl font-black text-white mb-8 text-center break-words transition-transform ${feedback === 'wrong' || feedback === 'timeout' ? 'shake text-rose-500' : ''}`}>
                     {gameWords[currentIndex]?.zh}
                   </h2>
                   <button onClick={() => speakWord(gameWords[currentIndex].en)} className="mb-8 flex items-center gap-2 text-cyan-400 hover:text-white bg-slate-900/80 hover:bg-cyan-600/50 border border-cyan-500/30 px-6 py-2 rounded-full font-bold transition-all shadow-lg">
                     <Volume2 className="w-5 h-5" /> 聆聽發音
                   </button>
                 </>
               )}

               <div className="w-full max-w-3xl">
                  {/* --- 認讀模式 (UFO 防禦) --- */}
                  {selectedMode === 'recognition' && (
                    <div className="relative w-full h-[450px] md:h-[500px] bg-slate-950 overflow-hidden border-2 border-slate-700 rounded-3xl shadow-inner mt-2">
                      <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black opacity-90"></div>
                      
                      {/* 背景裝飾 (星星) */}
                      <div className="absolute top-10 left-10 w-1 h-1 bg-white rounded-full opacity-50 animate-ping"></div>
                      <div className="absolute top-20 right-20 w-2 h-2 bg-blue-400 rounded-full opacity-30 animate-pulse"></div>
                      <div className="absolute bottom-40 left-1/4 w-1.5 h-1.5 bg-yellow-200 rounded-full opacity-40 animate-ping" style={{animationDelay: '1s'}}></div>

                      {options.map((opt, i) => {
                        const maxTime = diffSettings.timePerQuestion;
                        const dropPercentage = Math.max(0, Math.min(85, ((maxTime - timeLeft) / maxTime) * 85));
                        const isShot = shotAnswer === opt.en;
                        const isCorrect = opt.en === gameWords[currentIndex].en;

                        let enemyState = "alive";
                        if (feedback) {
                          if (isCorrect && (feedback === 'correct' || feedback === 'timeout')) enemyState = "destroyed";
                          else if (isShot && feedback === 'wrong') enemyState = "shielded";
                        }

                        return (
                          <button
                            key={i}
                            onClick={() => handleAnswer(opt.en)}
                            disabled={feedback !== null || isPaused}
                            className={`absolute transform -translate-x-1/2 flex flex-col items-center transition-all duration-200 z-10 ${
                              enemyState === 'destroyed' ? 'scale-150 opacity-0 duration-500' : enemyState === 'shielded' ? 'shake' : 'hover:scale-110 hover:-translate-y-2'
                            }`}
                            style={{ left: `${16 + i * 22}%`, top: `${dropPercentage}%` }}
                          >
                            {enemyState === 'destroyed' ? (
                              <div className="w-24 h-24 bg-orange-500 rounded-full blur-2xl animate-pulse"></div>
                            ) : (
                              <>

                  <div>
                     <h2 className="text-3xl font-black text-white mb-1">榮譽殿堂</h2>
                     <p className="text-amber-200/80 font-medium">解鎖所有成就，證明你是單字大師！</p>
                  </div>
               </div>
               
               <div className="z-10 bg-slate-900/80 p-5 rounded-2xl border border-slate-700 w-full md:w-64">
                  <div className="flex justify-between items-end mb-2">
                     <span className="text-slate-400 font-bold text-sm">解鎖進度</span>
                     <span className="text-2xl font-black text-amber-400">{unlockedCount} <span className="text-sm text-slate-500">/ {totalCount}</span></span>
                  </div>
                  <div className="w-full bg-slate-800 rounded-full h-3 overflow-hidden border border-slate-700">
                     <div className="bg-gradient-to-r from-amber-600 to-yellow-400 h-full rounded-full transition-all duration-1000" style={{width: `${progressPercentage}%`}}></div>
                  </div>
               </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
              {Object.values(ACHIEVEMENTS).map((achievement) => {
                 const isUnlocked = student.achievements.includes(achievement.id);
                 return (
                  <div
                    key={achievement.id}
                    className={`relative p-6 rounded-3xl border-2 transition-all duration-500 flex items-start gap-4 overflow-hidden ${
                      isUnlocked
                        ? 'bg-gradient-to-br from-slate-800 to-slate-900 border-amber-500/50 shadow-[0_0_20px_rgba(245,158,11,0.1)]'
                        : 'bg-slate-800/40 border-slate-700/50 opacity-60 grayscale-[50%]'
                    }`}
                  >
                    {isUnlocked && <div className="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-amber-400/20 to-transparent rounded-bl-full"></div>}
                    
                    <div className={`text-4xl p-3 rounded-2xl ${isUnlocked ? 'bg-slate-900 border border-amber-500/30' : 'bg-slate-900/50 border border-slate-700'}`}>
                       {achievement.icon}
                    </div>
                    <div className="flex-1 pt-1">
                      <h3 className={`text-xl font-bold mb-1 ${isUnlocked ? 'text-white' : 'text-slate-400'}`}>{achievement.name}</h3>
                      <p className={`text-sm leading-snug mb-3 ${isUnlocked ? 'text-slate-300' : 'text-slate-500'}`}>{achievement.desc}</p>
                      
                      {isUnlocked ? (
                        <div className="inline-flex items-center gap-1.5 bg-emerald-500/10 text-emerald-400 text-xs font-bold px-2.5 py-1 rounded-full border border-emerald-500/20">
                           <Check size={12} /> 已解鎖
                        </div>
                      ) : (
                        <div className="inline-flex items-center gap-1.5 bg-slate-900 text-slate-500 text-xs font-bold px-2.5 py-1 rounded-full border border-slate-700">
                           <Lock size={12} /> 未解鎖
                        </div>
                      )}
                    </div>
                  </div>
                 )
              })}
            </div>
          </div>
        </div>
      );
    };

    // ========== 應用入口 ==========
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
