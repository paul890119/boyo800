    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.6), inset 0 0 15px rgba(59, 130, 246, 0.3); }

    }
    .pulse-glow { animation: pulse-glow 2s infinite; }
    
    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .slide-up { animation: slide-up 0.5s ease-out; }
    
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      50% { opacity: 1; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .bounce-in { animation: bounce-in 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 3s ease-in-out infinite; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.5s; }

    @keyframes spin-slow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spin-slow { animation: spin-slow 4s linear infinite; }

    const shuffleArray = (array) => {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    };

    const speakWord = (word, lang = 'en-US') => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = lang;
        utterance.rate = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = voices.find(v => v.lang.includes(lang)) || voices[0];
        if (bestVoice) utterance.voice = bestVoice;
        window.speechSynthesis.speak(utterance);
      }
    };

      const [lives, setLives] = useState(3);
      const [combo, setCombo] = useState(0);
      const [progress, setProgress] = useState({ totalScore: 0, totalStars: 0 });

      const startGame = (mode) => {
        if (!selectedLesson) return;
        setSelectedMode(mode);
        const words = shuffleArray(VOCAB_800[selectedLesson] || []).slice(0, 20);

        setScreen('game');
      };

      const handleAnswer = (isCorrect) => {
        if (isCorrect) {
          setScore(s => s + 10);
          setCombo(c => c + 1);
        } else {
          setLives(l => l - 1);
          setCombo(0);
        }

        if (currentIndex + 1 < gameWords.length && lives > 1) {
          setCurrentIndex(i => i + 1);
        } else {
          setProgress(p => ({...p, totalScore: p.totalScore + score}));
          setScreen('home');
        }
      };

      if (screen === 'home') {
        return (
          <div className="min-h-screen bg-gradient-to-b from-slate-900 via-purple-900 to-slate-900 text-white flex flex-col items-center justify-center p-4">
            <h1 className="text-5xl font-bold mb-4 neon-glow">博幼 800 單</h1>
            <p className="text-xl text-cyan-300 mb-12">單字爭霸戰 - 完全修復版</p>
            <button onClick={() => setScreen('lesson')} className="px-8 py-4 bg-blue-600 hover:bg-blue-500 rounded-lg text-xl font-bold mb-6 pulse-glow">開始遊戲</button>
            <div className="text-lg">總分: {progress.totalScore} ⭐</div>
          </div>
        );
      }

      if (screen === 'lesson') {
        return (
          <div className="min-h-screen bg-gradient-to-b from-slate-900 via-purple-900 to-slate-900 text-white p-8">
            <button onClick={() => setScreen('home')} className="mb-6 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded">← 返回</button>
            <h2 className="text-3xl font-bold mb-8">選擇課程 (Lesson)</h2>
            <div className="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-8 gap-3">
              {Object.keys(VOCAB_800).map(lesson => (
                <button
                  key={lesson}
                  onClick={() => {
                    setSelectedLesson(lesson);
                    setScreen('mode');
                  }}
                  className="p-4 bg-slate-800 hover:bg-slate-700 border-2 border-slate-700 hover:border-cyan-500 rounded-lg font-bold text-lg transition"
                >
                  L{lesson}
                </button>
              ))}
            </div>
          </div>
        );
      }

      if (screen === 'mode') {
        return (
          <div className="min-h-screen bg-gradient-to-b from-slate-900 via-purple-900 to-slate-900 text-white p-8 flex flex-col items-center justify-center">
            <button onClick={() => setScreen('lesson')} className="absolute top-8 left-8 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded">← 返回</button>
            <h2 className="text-4xl font-bold mb-12">Lesson {selectedLesson} - 選擇模式</h2>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl">
              <button
                onClick={() => startGame('recognition')}
                className="p-8 bg-green-600 hover:bg-green-500 rounded-lg text-2xl font-bold transition transform hover:scale-105"
              >
                🎯 認讀挑戰
              </button>
              <button
                onClick={() => startGame('scramble')}
                className="p-8 bg-yellow-600 hover:bg-yellow-500 rounded-lg text-2xl font-bold transition transform hover:scale-105"
              >
                🔀 字母重組
              </button>
              <button
                onClick={() => startGame('spelling')}
                className="p-8 bg-blue-600 hover:bg-blue-500 rounded-lg text-2xl font-bold transition transform hover:scale-105"
              >
                ⌨️ 拼字測驗
              </button>
            </div>
          </div>
        );
      }

      if (screen === 'game' && gameWords.length > 0) {
        const current = gameWords[currentIndex];
        return (
          <div className="min-h-screen bg-gradient-to-b from-slate-900 via-purple-900 to-slate-900 text-white p-6 flex flex-col">
            <div className="flex justify-between mb-8 text-2xl font-bold">
              <div>分數: {score}</div>
              <div>連擊: {combo}</div>
              <div>❤️ {lives}</div>
            </div>
            <div className="flex-1 flex flex-col items-center justify-center">
              <div className="text-5xl font-bold mb-12 bg-slate-800 p-8 rounded-lg">{current.zh}</div>
              <div className="grid grid-cols-2 gap-4">
                <button onClick={() => handleAnswer(true)} className="px-6 py-3 bg-green-600 hover:bg-green-500 rounded-lg text-lg font-bold">✓ 正確</button>
                <button onClick={() => handleAnswer(false)} className="px-6 py-3 bg-red-600 hover:bg-red-500 rounded-lg text-lg font-bold">✗ 錯誤</button>
              </div>
              <div className="mt-8 text-2xl">{current.en}</div>
            </div>
          </div>
        );
      }

      return null;
    }

    createRoot(document.getElementById('root')).render(<GameApp />);
  </script>
</body>
</html>
