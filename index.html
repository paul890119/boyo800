<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博幼800單 - 完整學習平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script>
        // ==================== 數據庫初始化 ====================
        const db = new Dexie('boyo800DB');
        db.version(1).stores({
            users: 'id, role',
            gameScores: 'id, userId, timestamp',
            studentProgress: 'id, studentId',
            courses: 'id'
        });

        // ==================== 全局狀態 ====================
        const AppState = {
            currentPage: 'login',
            role: null, // 'student' or 'teacher'
            userId: localStorage.getItem('userId') || `user_${Date.now()}`,
            userName: localStorage.getItem('userName') || '',
            userEmail: localStorage.getItem('userEmail') || '',
            isTeacher: false,
            theme: localStorage.getItem('theme') || 'light'
        };

        // ==================== 800個英文單詞數據庫 ====================
        const WORD_BANK = [
            // Lesson 1-5
            { id: 1, lesson: 1, word: 'the', meaning: '這個', difficulty: 'easy' },
            { id: 2, lesson: 1, word: 'be', meaning: '是', difficulty: 'easy' },
            { id: 3, lesson: 1, word: 'and', meaning: '和', difficulty: 'easy' },
            { id: 4, lesson: 1, word: 'a', meaning: '一個', difficulty: 'easy' },
            { id: 5, lesson: 1, word: 'in', meaning: '在...裡', difficulty: 'easy' },
            { id: 6, lesson: 2, word: 'have', meaning: '有', difficulty: 'easy' },
            { id: 7, lesson: 2, word: 'to', meaning: '到', difficulty: 'easy' },
            { id: 8, lesson: 2, word: 'it', meaning: '它', difficulty: 'easy' },
            { id: 9, lesson: 2, word: 'of', meaning: '...的', difficulty: 'easy' },
            { id: 10, lesson: 2, word: 'I', meaning: '我', difficulty: 'easy' },
            { id: 11, lesson: 3, word: 'that', meaning: '那個', difficulty: 'easy' },
            { id: 12, lesson: 3, word: 'for', meaning: '為了', difficulty: 'easy' },
            { id: 13, lesson: 3, word: 'you', meaning: '你', difficulty: 'easy' },
            { id: 14, lesson: 3, word: 'he', meaning: '他', difficulty: 'easy' },
            { id: 15, lesson: 3, word: 'was', meaning: '是（過去式）', difficulty: 'easy' },
            { id: 16, lesson: 4, word: 'on', meaning: '在...上面', difficulty: 'easy' },
            { id: 17, lesson: 4, word: 'at', meaning: '在', difficulty: 'easy' },
            { id: 18, lesson: 4, word: 'with', meaning: '和', difficulty: 'easy' },
            { id: 19, lesson: 4, word: 'as', meaning: '當...時', difficulty: 'easy' },
            { id: 20, lesson: 4, word: 'by', meaning: '被', difficulty: 'easy' },
            // ... 實際應用中應有800個單詞，這裡簡化示例
            // Lesson 5-10
            { id: 21, lesson: 5, word: 'all', meaning: '全部', difficulty: 'easy' },
            { id: 22, lesson: 5, word: 'we', meaning: '我們', difficulty: 'easy' },
            { id: 23, lesson: 5, word: 'can', meaning: '能', difficulty: 'normal' },
            { id: 24, lesson: 5, word: 'her', meaning: '她的', difficulty: 'easy' },
            { id: 25, lesson: 5, word: 'what', meaning: '什麼', difficulty: 'normal' },
            { id: 26, lesson: 6, word: 'which', meaning: '哪一個', difficulty: 'normal' },
            { id: 27, lesson: 6, word: 'their', meaning: '他們的', difficulty: 'easy' },
            { id: 28, lesson: 6, word: 'if', meaning: '如果', difficulty: 'normal' },
            { id: 29, lesson: 6, word: 'do', meaning: '做', difficulty: 'easy' },
            { id: 30, lesson: 6, word: 'get', meaning: '得到', difficulty: 'normal' },
            { id: 31, lesson: 7, word: 'go', meaning: '去', difficulty: 'easy' },
            { id: 32, lesson: 7, word: 'make', meaning: '做', difficulty: 'normal' },
            { id: 33, lesson: 7, word: 'know', meaning: '知道', difficulty: 'normal' },
            { id: 34, lesson: 7, word: 'take', meaning: '拿', difficulty: 'normal' },
            { id: 35, lesson: 7, word: 'see', meaning: '看', difficulty: 'normal' },
            { id: 36, lesson: 8, word: 'come', meaning: '來', difficulty: 'normal' },
            { id: 37, lesson: 8, word: 'think', meaning: '想', difficulty: 'normal' },
            { id: 38, lesson: 8, word: 'use', meaning: '使用', difficulty: 'normal' },
            { id: 39, lesson: 8, word: 'find', meaning: '找到', difficulty: 'normal' },
            { id: 40, lesson: 8, word: 'give', meaning: '給', difficulty: 'normal' },
            // 更多單詞...為了演示，這裡只列部分
            { id: 41, lesson: 9, word: 'tell', meaning: '告訴', difficulty: 'normal' },
            { id: 42, lesson: 9, word: 'ask', meaning: '問', difficulty: 'easy' },
            { id: 43, lesson: 9, word: 'work', meaning: '工作', difficulty: 'normal' },
            { id: 44, lesson: 9, word: 'call', meaning: '叫', difficulty: 'easy' },
            { id: 45, lesson: 9, word: 'try', meaning: '試', difficulty: 'easy' },
            { id: 46, lesson: 10, word: 'feel', meaning: '感覺', difficulty: 'normal' },
            { id: 47, lesson: 10, word: 'become', meaning: '變成', difficulty: 'normal' },
            { id: 48, lesson: 10, word: 'leave', meaning: '離開', difficulty: 'normal' },
            { id: 49, lesson: 10, word: 'put', meaning: '放', difficulty: 'easy' },
            { id: 50, lesson: 10, word: 'mean', meaning: '意思是', difficulty: 'normal' }
        ];

        // ==================== 頁面路由 ====================
        function render() {
            const root = document.getElementById('root');
            let html = '';

            if (!AppState.role) {
                html = renderLoginPage();
            } else if (AppState.role === 'student') {
                html = renderStudentApp();
            } else if (AppState.role === 'teacher') {
                html = renderTeacherDashboard();
            }

            root.innerHTML = html;
            attachEventHandlers();
        }

        // ==================== 登入頁面 ====================
        function renderLoginPage() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center p-4">
                    <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md animate-fade-in">
                        <div class="text-center mb-8">
                            <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-2">📚</h1>
                            <h1 class="text-3xl font-bold text-gray-800">博幼800單</h1>
                            <p class="text-gray-600 mt-2">完整學習平台</p>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">姓名</label>
                                <input type="text" id="loginName" placeholder="輸入你的名字"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">信箱（選填）</label>
                                <input type="email" id="loginEmail" placeholder="your@email.com"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>

                            <button onclick="loginAsStudent()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition">
                                🎮 學生登入
                            </button>
                            <button onclick="loginAsTeacher()" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 rounded-lg transition">
                                👨‍🏫 教師登入
                            </button>
                        </div>

                        <div class="mt-6 pt-6 border-t border-gray-200 text-center text-xs text-gray-500">
                            <p>本平台為離線演示版本</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== 學生遊戲應用 ====================
        function renderStudentApp() {
            const pages = {
                menu: renderStudentMenu,
                game: renderGamePage,
                progress: renderProgressPage
            };

            const currentPage = AppState.currentStudentPage || 'menu';
            return pages[currentPage]?.() || pages.menu();
        }

        function renderStudentMenu() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 p-4">
                    <div class="max-w-md mx-auto">
                        <!-- Header -->
                        <div class="bg-white rounded-lg shadow-lg p-6 mb-6 text-center">
                            <h1 class="text-3xl font-bold text-blue-600 mb-2">🎮 博幼800單</h1>
                            <p class="text-gray-600">歡迎 <strong>${AppState.userName}</strong></p>
                            <p class="text-sm text-gray-500 mt-2">玩家ID: ${AppState.userId.substring(5, 15)}</p>
                        </div>

                        <!-- 快速統計 -->
                        <div class="grid grid-cols-3 gap-3 mb-6">
                            <div class="bg-white rounded-lg shadow p-4 text-center">
                                <div class="text-2xl font-bold text-blue-600" id="totalScore">0</div>
                                <div class="text-xs text-gray-600">總分</div>
                            </div>
                            <div class="bg-white rounded-lg shadow p-4 text-center">
                                <div class="text-2xl font-bold text-green-600" id="gamesPlayed">0</div>
                                <div class="text-xs text-gray-600">遊戲局數</div>
                            </div>
                            <div class="bg-white rounded-lg shadow p-4 text-center">
                                <div class="text-2xl font-bold text-yellow-600" id="totalStars">0</div>
                                <div class="text-xs text-gray-600">星星</div>
                            </div>
                        </div>

                        <!-- 主菜單按鈕 -->
                        <div class="space-y-4">
                            <div class="bg-white rounded-lg shadow-lg p-6">
                                <h2 class="text-xl font-bold text-gray-800 mb-4">🎯 選擇模式</h2>
                                <div class="space-y-3">
                                    <button onclick="startGame('recognition')" 
                                        class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-bold py-3 rounded-lg transition">
                                        🖱️ 認讀挑戰<br><span class="text-xs font-normal">選出正確的單詞</span>
                                    </button>
                                    <button onclick="startGame('scramble')" 
                                        class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold py-3 rounded-lg transition">
                                        🔤 字母重組<br><span class="text-xs font-normal">重組亂序字母</span>
                                    </button>
                                    <button onclick="startGame('spelling')" 
                                        class="w-full bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white font-bold py-3 rounded-lg transition">
                                        ⌨️ 拼字測驗<br><span class="text-xs font-normal">根據意思拼單詞</span>
                                    </button>
                                </div>
                            </div>

                            <div class="bg-white rounded-lg shadow-lg p-6">
                                <h2 class="text-lg font-bold text-gray-800 mb-3">⚙️ 功能</h2>
                                <button onclick="AppState.currentStudentPage = 'progress'; render()" 
                                    class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 rounded-lg transition mb-2">
                                    📈 查看進度
                                </button>
                                <button onclick="logout()" 
                                    class="w-full bg-red-100 hover:bg-red-200 text-red-700 font-medium py-2 rounded-lg transition">
                                    🚪 登出
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderGamePage() {
            const gameState = AppState.currentGame || {
                mode: 'recognition',
                questionIndex: 0,
                score: 0,
                totalQuestions: 10,
                answers: []
            };

            if (gameState.questionIndex >= gameState.totalQuestions) {
                return renderGameResults(gameState);
            }

            const question = generateQuestion(gameState.mode, gameState.questionIndex);

            return `
                <div class="min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 p-4">
                    <div class="max-w-2xl mx-auto">
                        <!-- 遊戲 HUD -->
                        <div class="bg-white rounded-lg shadow-lg p-4 mb-6">
                            <div class="grid grid-cols-4 gap-2 mb-4">
                                <div class="bg-blue-50 p-3 rounded text-center">
                                    <div class="text-sm text-gray-600">分數</div>
                                    <div class="text-2xl font-bold text-blue-600">${gameState.score}</div>
                                </div>
                                <div class="bg-yellow-50 p-3 rounded text-center">
                                    <div class="text-sm text-gray-600">進度</div>
                                    <div class="text-2xl font-bold text-yellow-600">${gameState.questionIndex + 1}/${gameState.totalQuestions}</div>
                                </div>
                                <div class="col-span-2">
                                    <div class="w-full bg-gray-300 rounded-full h-3">
                                        <div class="bg-blue-500 h-3 rounded-full progress-bar" style="width: ${((gameState.questionIndex + 1) / gameState.totalQuestions) * 100}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 問題卡片 -->
                        <div class="bg-gradient-to-br from-blue-600 to-purple-700 rounded-lg shadow-2xl p-8 mb-6 text-white">
                            <p class="text-center text-sm opacity-90 mb-4">第 ${gameState.questionIndex + 1} 題 / ${gameState.totalQuestions}</p>
                            <div class="text-center">
                                <p class="text-5xl font-bold mb-4">${question.display}</p>
                                <p class="text-lg opacity-90">${question.hint}</p>
                            </div>
                        </div>

                        <!-- 選項 -->
                        <div class="bg-white rounded-lg shadow-lg p-6">
                            <div class="grid grid-cols-1 gap-3">
                                ${question.options.map((option, idx) => `
                                    <button onclick="answerQuestion('${option}', '${question.correct}')" 
                                        class="p-4 bg-gray-100 hover:bg-blue-100 text-gray-800 font-bold rounded-lg transition transform hover:scale-105 border-2 border-transparent hover:border-blue-500">
                                        ${String.fromCharCode(65 + idx)}. ${option}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <!-- 返回按鈕 -->
                        <button onclick="exitGame()" class="w-full mt-4 bg-red-500 hover:bg-red-600 text-white font-bold py-2 rounded-lg transition">
                            🚪 結束遊戲
                        </button>
                    </div>
                </div>
            `;
        }

        function renderGameResults(gameState) {
            const stars = Math.floor((gameState.score / (gameState.totalQuestions * 10)) * 3) + 1;
            const accuracy = Math.round((gameState.score / (gameState.totalQuestions * 10)) * 100);

            return `
                <div class="min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center p-4">
                    <div class="bg-white rounded-lg shadow-2xl p-8 text-center max-w-md animate-fade-in">
                        <div class="text-6xl mb-6">${stars >= 3 ? '🎉' : stars >= 2 ? '😊' : '💪'}</div>
                        <h2 class="text-3xl font-bold text-gray-800 mb-4">遊戲完成！</h2>
                        
                        <div class="bg-gradient-to-r from-yellow-100 to-orange-100 rounded-lg p-4 mb-6">
                            <p class="text-lg font-bold text-orange-600">
                                ${'⭐'.repeat(stars)} ${stars}/3 顆星
                            </p>
                        </div>

                        <div class="space-y-3 mb-8">
                            <div class="bg-blue-50 p-4 rounded-lg">
                                <p class="text-gray-600 text-sm">最終分數</p>
                                <p class="text-3xl font-bold text-blue-600">${gameState.score}</p>
                            </div>
                            <div class="bg-green-50 p-4 rounded-lg">
                                <p class="text-gray-600 text-sm">正確率</p>
                                <p class="text-3xl font-bold text-green-600">${accuracy}%</p>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <button onclick="AppState.currentStudentPage = 'menu'; AppState.currentGame = null; render()" 
                                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition">
                                🏠 返回主頁
                            </button>
                            <button onclick="startGame('${AppState.currentGame.mode}')" 
                                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition">
                                🔄 再玩一次
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProgressPage() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-blue-500 to-purple-600 p-4">
                    <div class="max-w-md mx-auto">
                        <button onclick="AppState.currentStudentPage = 'menu'; render()" 
                            class="mb-6 text-white hover:text-gray-200 flex items-center gap-2">
                            ← 返回
                        </button>

                        <div class="bg-white rounded-lg shadow-lg p-6">
                            <h2 class="text-2xl font-bold text-gray-800 mb-6">📈 我的學習進度</h2>

                            <div class="space-y-4">
                                <div class="bg-gradient-to-r from-blue-50 to-blue-100 p-4 rounded-lg">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="font-bold text-gray-800">認讀挑戰</span>
                                        <span class="text-blue-600 font-bold">850分</span>
                                    </div>
                                    <div class="w-full bg-gray-300 rounded-full h-2">
                                        <div class="bg-blue-500 h-2 rounded-full" style="width: 85%"></div>
                                    </div>
                                </div>

                                <div class="bg-gradient-to-r from-green-50 to-green-100 p-4 rounded-lg">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="font-bold text-gray-800">字母重組</span>
                                        <span class="text-green-600 font-bold">720分</span>
                                    </div>
                                    <div class="w-full bg-gray-300 rounded-full h-2">
                                        <div class="bg-green-500 h-2 rounded-full" style="width: 72%"></div>
                                    </div>
                                </div>

                                <div class="bg-gradient-to-r from-purple-50 to-purple-100 p-4 rounded-lg">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="font-bold text-gray-800">拼字測驗</span>
                                        <span class="text-purple-600 font-bold">920分</span>
                                    </div>
                                    <div class="w-full bg-gray-300 rounded-full h-2">
                                        <div class="bg-purple-500 h-2 rounded-full" style="width: 92%"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-yellow-50 rounded-lg p-4 mt-6 text-center">
                                <p class="text-yellow-800 font-bold">⭐ 累計星星: 45顆</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== 教師後台儀表板 ====================
        function renderTeacherDashboard() {
            const pages = {
                overview: renderTeacherOverview,
                students: renderTeacherStudents,
                progress: renderTeacherProgress,
                statistics: renderTeacherStatistics
            };

            const currentPage = AppState.currentTeacherPage || 'overview';
            return pages[currentPage]?.() || pages.overview();
        }

        function renderTeacherOverview() {
            return `
                <div class="min-h-screen bg-gray-50">
                    <!-- Navigation -->
                    <nav class="bg-white shadow-md">
                        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 class="text-2xl font-bold text-blue-600">📚 教師後台</h1>
                            <div class="flex items-center gap-4">
                                <span class="text-gray-600">歡迎，${AppState.userName}</span>
                                <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium">
                                    登出
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div class="flex">
                        <!-- Sidebar -->
                        <aside class="w-64 bg-white shadow-md min-h-[calc(100vh-70px)] p-4">
                            <nav class="space-y-2">
                                <button onclick="AppState.currentTeacherPage = 'overview'; render()" 
                                    class="w-full text-left px-4 py-3 ${AppState.currentTeacherPage === 'overview' || !AppState.currentTeacherPage ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100'} rounded-lg font-medium">
                                    📊 儀表板
                                </button>
                                <button onclick="AppState.currentTeacherPage = 'students'; render()" 
                                    class="w-full text-left px-4 py-3 ${AppState.currentTeacherPage === 'students' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100'} rounded-lg font-medium">
                                    👥 學生管理
                                </button>
                                <button onclick="AppState.currentTeacherPage = 'progress'; render()" 
                                    class="w-full text-left px-4 py-3 ${AppState.currentTeacherPage === 'progress' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100'} rounded-lg font-medium">
                                    📈 進度追蹤
                                </button>
                                <button onclick="AppState.currentTeacherPage = 'statistics'; render()" 
                                    class="w-full text-left px-4 py-3 ${AppState.currentTeacherPage === 'statistics' ? 'bg-blue-100 text-blue-600' : 'hover:bg-gray-100'} rounded-lg font-medium">
                                    📋 統計分析
                                </button>
                            </nav>
                        </aside>

                        <!-- Main Content -->
                        <main class="flex-1 p-8">
                            <h2 class="text-3xl font-bold text-gray-800 mb-6">儀表板</h2>

                            <!-- 統計卡片 -->
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                                <div class="bg-white rounded-lg shadow p-6">
                                    <div class="text-gray-600 text-sm font-medium">學生總數</div>
                                    <div class="text-4xl font-bold text-blue-600 mt-2">12</div>
                                    <div class="text-gray-500 text-xs mt-2">已管理學生</div>
                                </div>
                                <div class="bg-white rounded-lg shadow p-6">
                                    <div class="text-gray-600 text-sm font-medium">班級平均分數</div>
                                    <div class="text-4xl font-bold text-green-600 mt-2">825</div>
                                    <div class="text-gray-500 text-xs mt-2">整體表現</div>
                                </div>
                                <div class="bg-white rounded-lg shadow p-6">
                                    <div class="text-gray-600 text-sm font-medium">總遊戲局數</div>
                                    <div class="text-4xl font-bold text-purple-600 mt-2">184</div>
                                    <div class="text-gray-500 text-xs mt-2">活躍度</div>

        // ==================== 遊戲邏輯函數 ====================
        function generateQuestion(mode, questionIndex) {
            const randomWords = WORD_BANK.sort(() => 0.5 - Math.random()).slice(0, 5);
            const correctWord = randomWords[0];

            let question = {
                correct: correctWord.word,
                options: []
            };

            if (mode === 'recognition') {
                question.display = correctWord.meaning;
                question.hint = '選出正確的英文單詞';
                question.options = randomWords.map(w => w.word).sort(() => 0.5 - Math.random());
            } else if (mode === 'scramble') {
                const scrambled = correctWord.word.split('').sort(() => 0.5 - Math.random()).join('');
                question.display = scrambled;
                question.hint = '重組這些字母';
                question.options = randomWords.map(w => w.word).sort(() => 0.5 - Math.random());
            } else if (mode === 'spelling') {
                question.display = correctWord.meaning;
                question.hint = '選出正確拼法';
                const wrongWords = randomWords.slice(1).map(w => w.word);
                question.options = [correctWord.word, ...wrongWords].sort(() => 0.5 - Math.random());
            }

            return question;
        }

        function answerQuestion(answer, correct) {
            if (!AppState.currentGame) return;

            if (answer === correct) {
                AppState.currentGame.score += 10;
            }

            AppState.currentGame.answers.push({
                answer,
                correct,
                isCorrect: answer === correct
            });

            AppState.currentGame.questionIndex++;
            render();
        }

        function startGame(mode) {
            AppState.currentGame = {
                mode: mode,
                questionIndex: 0,
                score: 0,
                totalQuestions: 10,
                answers: []
            };
            AppState.currentStudentPage = 'game';
            render();
        }

        function exitGame() {
            if (confirm('確定要結束遊戲嗎？')) {
                AppState.currentStudentPage = 'menu';
                AppState.currentGame = null;
                render();
            }
        }
